<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>附議地圖｜鄉鎮市區分布</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
<style>
:root{
  --navy:#123d72; --blue:#2f79b7; --sky:#79b7d8; --pale:#dcecf6;
  --ink:#16314f; --muted:#60788f; --line:#d7e3ec; --bg:#f4f8fb; --card:#fff;
}
*{box-sizing:border-box}
body{margin:0;font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;color:var(--ink);background:var(--bg)}
header{padding:24px 28px 16px;background:white;border-top:10px solid #5aa2c9;border-bottom:1px solid var(--line)}
h1{margin:0;font-size:clamp(25px,3vw,42px);letter-spacing:.04em}
.subtitle{margin-top:8px;color:var(--muted);font-size:14px}
.stats{display:flex;gap:12px;flex-wrap:wrap;margin-top:16px}
.mode-switch{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}
.cta-box{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-top:16px;padding:14px 16px;background:#edf5fa;border:1px solid #cfe0eb;border-radius:14px}
.cta-copy{display:flex;flex-direction:column;gap:4px;line-height:1.5}
.cta-copy strong{color:var(--navy);font-size:16px}
.cta-copy span{color:var(--muted);font-size:13px}
.cta-link{display:inline-flex;align-items:center;justify-content:center;text-decoration:none;background:var(--navy);color:white;padding:10px 16px;border-radius:999px;font-weight:700;white-space:nowrap}
.cta-link:hover{filter:brightness(1.08)}

.mode-btn{border:1px solid var(--line);background:white;color:var(--ink);border-radius:999px;padding:9px 16px;cursor:pointer;font-weight:700}
.mode-btn.active{background:var(--navy);color:white;border-color:var(--navy)}
.stat{background:#edf5fa;border:1px solid #cfe0eb;border-radius:14px;padding:10px 14px;min-width:130px}
.stat b{display:block;font-size:24px;color:var(--navy)}
main{display:grid;grid-template-columns:minmax(0,1.55fr) minmax(320px,.85fr);gap:18px;padding:18px;max-width:1500px;margin:auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:0 8px 24px rgba(25,67,100,.07)}
.map-card{position:relative;min-height:760px;overflow:hidden}
#map{width:100%;height:760px;display:block}
.map-status{position:absolute;left:18px;top:18px;background:rgba(255,255,255,.94);padding:9px 12px;border-radius:10px;border:1px solid var(--line);font-size:14px}
.legend{position:absolute;right:18px;bottom:18px;background:rgba(255,255,255,.94);padding:12px;border-radius:12px;border:1px solid var(--line)}
.legend-row{display:flex;align-items:center;gap:8px;font-size:12px;margin:4px 0}
.swatch{width:25px;height:14px;border-radius:3px}
.town{stroke:#7890a1;stroke-width:.45;vector-effect:non-scaling-stroke;cursor:pointer;transition:opacity .15s,stroke-width .15s}
.town:hover,.town.active{stroke:#0b2f5d;stroke-width:1.7}
.panel{padding:20px;max-height:796px;overflow:auto}
.panel h2{margin:0 0 4px;font-size:25px}
.panel .meta{color:var(--muted);margin-bottom:16px}
.prompt{padding:28px 8px;color:var(--muted);line-height:1.8}
.comment{padding:14px 0;border-top:1px solid var(--line);line-height:1.65;white-space:pre-wrap;overflow-wrap:anywhere}
.comment:first-child{border-top:0}
.comment-time{font-size:12px;color:#8a9baa;margin-bottom:4px}
.no-comment{padding:20px 0;color:var(--muted)}
.toplist{margin-top:18px;border-top:1px solid var(--line);padding-top:16px}
.topitem{display:flex;justify-content:space-between;gap:12px;padding:8px 0;cursor:pointer}
.topitem:hover{color:var(--blue)}
.tooltip{position:fixed;pointer-events:none;background:#102f50;color:white;padding:8px 10px;border-radius:8px;font-size:13px;opacity:0;z-index:20;box-shadow:0 5px 20px rgba(0,0,0,.2)}
.error{padding:24px;line-height:1.7;color:#8c2d2d}
button{font:inherit}
.back{border:1px solid var(--line);background:white;border-radius:9px;padding:7px 10px;cursor:pointer;margin-bottom:12px}
@media(max-width:900px){
 main{grid-template-columns:1fr;padding:10px}
 .map-card{min-height:580px}
 #map{height:580px}
 .panel{max-height:none}
 header{padding:18px 16px 14px}
}

@media(max-width:900px){
 .legend{left:14px;right:auto;bottom:14px;max-width:46vw;padding:10px}
 .legend-row{font-size:11px;gap:6px}
 .swatch{width:22px;height:13px}
}


.cta-copy strong{max-width:820px}
@media(max-width:900px){
 .cta-box{align-items:flex-start}
 .cta-copy strong{font-size:15px;line-height:1.65}
 .cta-link{width:100%}
}

</style>
</head>
<body>
<header>
  <h1>附議人數・鄉鎮市區分布</h1>
  <div class="subtitle">點選地圖上的行政區，可查看附議人數與該地區的匿名留言。留言不顯示暱稱；資料擷取於 2026 年 7 月 23 日上午，並非最新資料。</div>
  <div class="stats">
    <div class="stat"><b id="total"></b>總附議人數</div>
    <div class="stat"><b id="commentTotal"></b>有留言附議</div>
    <div class="stat"><b id="covered"></b><span id="coveredLabel">有附議鄉鎮</span></div>
  </div>
  <div class="mode-switch" aria-label="地圖顯示層級">
    <button class="mode-btn active" id="townModeBtn" type="button">鄉鎮市區</button>
    <button class="mode-btn" id="countyModeBtn" type="button">縣市</button>
  </div>
  <div class="cta-box">
    <div class="cta-copy">
      <strong>修正運動部《我國參加國際大型運動賽會組團參賽原則》，保障已取得參賽資格選手之參賽權益</strong>
    </div>
    <a class="cta-link" href="https://join.gov.tw/idea/detail/d1a49641-2382-49e5-bcdd-b51db932d771" target="_blank" rel="noopener noreferrer">前往公共政策平台附議</a>
  </div>

</header>
<main>
  <section class="card map-card">
    <svg id="map" role="img" aria-label="臺灣鄉鎮市區附議人數地圖"></svg>
    <div class="map-status" id="status">地圖載入中…</div>
    <div class="legend" id="legend"></div>
  </section>
  <aside class="card panel" id="panel">
    <div class="prompt">請點選地圖上的鄉鎮市區。<br>右側將顯示該區附議人數及匿名留言。</div>
  </aside>
</main>

<script>

讓台灣有實力的選手 站上國際舞台。讓世界看到台灣！","time":"2026-07-12"},{"text":"希望相關的各部會可以討論看看能否調整資源配置以及修改法規與規則，讓真正有實力以及現在正在逐漸火熱當中的運動能夠激勵更多青少年多元的運動選擇以及對於運動職涯發展的一線希望","time":"2026-07-12"},{"text":"建議修正方向如下：\n\n \n\n一、明定已依國際總會、亞洲總會、主辦單位或相關資格賽制度取得奧運、亞運參賽資格或配額之選手，原則上應予以報名參賽。若主管機關或選訓單位認為有不予派員之必要，應提出具體、客觀、可檢驗之理由，並建立書面告知、申復與外部審查機制。\n\n \n\n二、修正「得牌奪金為參賽目標」之單一導向文字，改為「兼顧競技成績、選手權益、國際參與、新興運動發展及國家運動長期培育」。奧亞運固然是重要競技舞台，但不應只以短期獎牌績效作為唯一政策目標。\n\n \n\n三、要求運動部公開各項國際大型賽會之選訓、組團、報名及不予派員標準。當選手已取得參賽資格卻未獲報名時，應公開說明決策依據、會議紀錄、評估標準及救濟管道，以提升制度透明度與社會信任。\n\n \n\n四、邀集選手代表、教練、單項協會、運動科學專家、法律學者、運動產業及基層運動推動者，共同檢討《我國參加國際大型運動賽會組團參賽原則》，使其符合運動部成立後所宣示之全民運動、運動平權、多元參與與長期培育精神。","time":"2026-07-23"},{"text":"法規應是隨著時代發展來制定更符合現下的環境，不應該繼續被舊思維限制","time":"2026-07-16"}]},"高雄市鳳山區":{"county":"高雄市","town":"鳳山區","count":50,"comments":[{"text":"選手本來就有參賽的資格，為什麼可以把主觀的認定當作客觀的結果，使得想努力的人被阻止向前","time":"2026-07-10"},{"text":"體育賽事是一個可以推廣國家和人民的方式，儘管選手實力未達預期，沒有實戰經驗的話，是要如何有比賽臨場反應、克服緊張等等，運動部不該以此原則抹殺了具有潛力的選手，因此希望能改進，讓更多有夢想的運動員發光！","time":"2026-07-10"},{"text":"若以獲得參賽資格，國家運動部應給予支持鼓勵，讓台灣運動員更有機會可以參與各項賽事","time":"2026-07-11"},{"text":"支持","time":"2026-07-11"},{"text":"希望能讓選手們出國比賽增加能見度與經驗","time":"2026-07-11"},{"text":"每位選手都應該🈶參賽權，給機會才有更多經驗","time":"2026-07-11"},{"text":"請立法院快點審預算\n讓台灣運動員能夠站上國際舞台累積經驗！","time":"2026-07-11"},{"text":"給台灣選手機會看見世界的樣子，而不是當個井底之蛙","time":"2026-07-11"},{"text":"已取得參賽資格的選手權益，應該獲得保障。有漏洞之法規，理應快速修正。","time":"2026-07-11"},{"text":"希望選手能夠順利出賽，代表國家隊出賽。","time":"2026-07-11"},{"text":"讚","time":"2026-07-11"},{"text":"選拔不宜唯奪牌是問。應效法先進國家揚棄績效導向，落實全民體育，健全多元評估與生涯保障，俾利全國體育生態之永續發展。","time":"2026-07-16"},{"text":"附議，贊成","time":"2026-07-16"},{"text":"附議","time":"2026-07-16"},{"text":"運動部務必重新檢討國際賽事遴選原則。當選手已經符合並且取得賽事資格，國家必須讓選手自行決定是否參賽。協會推廣的資源應用在可能得名的選手上無庸置疑，但站在推廣的角度，無論取得名次可能性的高低，既然取得參賽資格，選手必須可以選擇自籌款項﹑自尋資源參宇賽事，這對於運動賽事經驗絕對都會是正面的助益。不能再讓任何有資格站上舞台的選手，因為錯誤的遴選制度而失去挑戰更高層級賽事的可能。同樣的爭議不斷的再次發生。這也證明，現在要求修正制度，並不是針對單一政黨或單一事件，而是完成一項早已被提出、卻遲遲沒有完成的體育改革。衝浪運動在台灣發展將近 30 年，作為海島國家，這是一個必然推廣給大眾的運動型態，這些年經由歷代衝浪玩家的努力，讓國內衝浪水準持續攀升，千萬不要浪費的所有人的努力。","time":"2026-07-18"}]},"桃園市桃園區":{"county" 牌奪金」的單一評選機制，常導致行政裁量空間過大，不僅扼殺了選手的參賽權益，更讓制度缺乏透明度，易衍生黑箱疑慮。\n​運動發展不應只看短期的獎牌績效。奧運與亞運等國際盛會，亦是新興運動項目累積國際經驗、提升能見度與帶動基層培育的關鍵舞台。若國家只投資具備「奪牌潛力」的項目，將使許多運動項目失去成長契機，甚至使「全民運動」淪為空談。\n​建議主管機關應建立更具現代化的治理制度：第一，明定客觀的報名標準，對於已取得國際資格之選手，若不予派員應具備可檢驗的公正理由；第二，建立公開的申復與救濟機制，讓選手有權為自己的努力爭取保障；第三，廣納選手、教練及專家建議，讓選訓過程透明化。\n​唯有落實程序正義，保障每一位運動員的參賽權，才能建立社會信任，讓台灣的體育環境更公平、多元且具備長期發展的競爭力。支持運動平權，讓選手能無後顧之憂地在國際舞台發光發熱。","time":"2026-07-11"},{"text":"支持努力訓練的選手們～","time":"2026-07-11"},{"text":"奪牌固然重要！支持「各項運動項目推展」與肯定「長期投入培訓之運動員們」，是一種積極的生命態度，更可由政府單位的態度看見格局及遠見！","time":"2026-07-11"},{"text":"如果沒有參與比賽累積經驗，運動員要如何進步","time":"2026-07-11"},{"text":"嚴厲支持各種運動包括抱石衝浪等相關規定改革。","time":"2026-07-11"},{"text":"不管是奧運 帕運及亞帕運等重大國際賽事，應全力支持達標，且符合國際賽會之規定選手，報名出賽為國爭光","time":"2026-07-13"},{"text":"1. 希望不要再以功利主義來決定是否能夠出賽，我們不要再像威權主義拿得牌來自我安慰或是自我感覺良好\n2. 但也同時希望社會大眾給各項運動更多的支持，才不會落入沒有資源的窘境\n3. 希望各協會能重新檢討選拔資格，許多選拔標準已不合時宜或是嚴苛到不切實際","time":"2026-07-13"}]},"臺北市北投區":{"county":"臺北市","town":"北投區","count":76,"comments":[{"text":"還沒打先認輸，華國體驗真心丟臉","time":"2026-07-08"},{"text":"支持運動攀登選手參加亞運，體育注重的不應該是結果而是過程，選手自身努力出來的參賽資格不該被漠視。若單純因為奪牌機率低而不允參賽，還有什麼選手會努力？國家孕育體育人才也\n絕對不是為了單純奪牌而已。","time":"2026-07-09"},{"text":"請給台灣選手合理參與國際賽事的機會！保障選手好不容易爭取到參與國際賽事資格的名額！而不是一句「沒有奪牌希望」就抹滅選手長期的努力和其努力爭取到的國際賽事資格名額，還連選手願意自費參賽都拒絕！","time":"2026-07-10"},{"text":"哪有人可以直接取消別人的參賽資格","time":"2026-07-10"},{"text":"保障一下啊！","time":"2026-07-10"},{"text":"我認為既然選手都已經擁有了比賽資格，就應該讓選手出賽。不能因為認為選手沒有奪牌能力就禁止選手出賽。選手需要比賽經驗才能讓奪牌的機率增加。","time":"2026-07-11"},{"text":"支持保障已取得參賽資格選手之參賽權益","time":"2026-07-11"},{"text":"決策過程的公開透明，才是教練＆選手真正想要看見的。","time":"2026-07-11"},{"text":"能不能參加比賽是大會跟運動員本身，在本人沒有放棄且已經具有比賽資格的情況下，我認為國家沒有權利剝奪他們的權益","time":"2026-07-11"},{"text":"台灣選手加油","time":"2026-07-11"},{"text":"支持","time":"2026-07-11"},{"text":"支持","time":"2026-07-11"},{"text":"選手需要靠比賽來累積經驗, 如果用奪牌希望不足而不讓選手參加比賽, 這樣如何能養成有奪牌希望的選手？","time":"2026-07-11"},{"text":"支持","time":"2026-07-11"},{"text":"不讓選手出去都是中共同路人","time":"2026-07-11"},{"text":"我希望選手的參賽能獲得保障","time":"2026-07-11"},{"text":"改變不合理的制度","time":"2026-07-12"},{"text":"明明可以代表台灣出賽，這是選手多大的光榮，卻要在可悲的體制下而無法代表台灣參賽，一點都看不出來對選手的支持。","time":"2026-07-12"},{"text":"希望政府能虛心檢討、既存的規章文案是否已經與時代脫鉤","time":"2026-07-13"},{"text":"支持攀岩運動","time":"2026-07-23"},{"text":"支持本提案，不要讓選手的心血變成辛酸","time":"2026-07-16"},{"text":"當選手已取得參賽資格卻未獲報名時，應公開說明決策依據、會議紀錄、評估標準及救濟管道，以提升制度透明度與社會信任。","time":"2026-07-18"}]},"新竹縣新埔鎮":{"county":"新竹縣","town":"新埔鎮","count":4,"comments":[{"text":"舊有制度真的需要再好好反思，改一下！！！","time":"2026-07-14"}]},"新北市鶯歌區":{"county":"新北市","town":"鶯歌區","count":11,"comments":[{"text":"因為沒有奪牌機會就不讓台灣的選手出去比賽？李洋和王齊麟奧運冠軍的時候一直蹭，現在現在卻不讓台灣的好手在國際舞台有個發光的機會 有沒有一點道理 你會不讓自己的小孩去比賽嗎？而且原因就是沒辦法拿到好名次 你自己想一想合理性 當你這麼做了等於阻斷台灣選手的未來，不是一直在說全民動起來要大家運動，現在你看這對台灣的恥辱，能不能考慮一下選手的心情？努力那麼久就被一條無理的原則限制，不要讓台灣淪落到連為自己國家爭光的機會都沒有好不好","time":"2026-07-11"},{"text":"推廣運動應有條件開放，修改不適合的舊制度，讓全民運動不再是口號。","time":"2026-07-12"}]},"新北市淡水區":{"county":"新北市","town":"淡水區","count":67,"comments":[{"text":"台灣衝浪加油💪","time":"2026-07-09"},{"text":"沒有人想打一場會輸的比賽，知道不會得第一名就不參加的規定，如果套用到所有運動類型，很多運動真的都可以不用玩了。\n目前各項等級國際賽事均有訂定參賽目標、組團原則、參賽標準、培訓標準、經費補助標準，當然國家資源仍應聚焦才可免於重要選手無法獲得適當支援。現行規定中其實都有規定各級比賽的條件，惟其他運動會之相關規定均採「個案評估」方式核辦，未訂定明確標準將可能使具國際賽事資格的選手無法獲得應有的資源，且可能也有「非重要賽事或選手」濫用資源之虞，例如未設參賽資格純為交流大拜拜性質的賽事活動。\n因此建議仍應明訂相關規定，避免相關單位受運動部委託執行相關選（培）訓計畫時，過度解讀（一定要奪牌等）組團參與原則，而忽略各級比賽本來就有的維護運動選手國際發展空間、累積國際參賽經驗等參賽目標。","time":"2026-07-10"},{"text":"希望台灣能夠讓各項運動平衡發展","time":"2026-07-10"},{"text":"如果不讓他們去試去闖 你怎麼會知道會不會有奇蹟發生呢？ 請相信他們相信台灣","time":"2026-07-10"},{"text":"這樣限制選手，並不單純只是提升奪牌率，而是降低選手對自己的自信，曾經身為選手的我，也經歷過拿到資格已經不容易，也耗費非常多資源和時間去磨練自己的技術能力，而自己努力取得的資格就因為這樣被剃除，是對選手的不尊重，也會對他造成心理的創傷，付出得來的資格就這樣剔除，論誰都不服，也沒有運動家精神。比賽目的是贏沒錯，但因為客觀判斷就不讓他去比，我認為非常的不合理，比賽不是看機率，而是看選手的實力與運氣，甚至是當下的心態而分出的","time":"2026-07-10"},{"text":"亞運已核准台灣兩位男子衝浪選手參賽，選手們努力爭取而來的參賽資格，卻被自己的國家拒絕。  台灣沒有公平公開的標準。 選手該怎麼為台灣爭光？","time":"2026-07-10"},{"text":"希望選手能順利進行國家隊出賽","time":"2026-07-11"},{"text":"支持台灣選手多多參賽！","time":"2026-07-11"},{"text":"讓選手們能站上世界！沒去參賽怎麼知道能不能獲得金牌？有參賽就有機會！","time":"2026-07-11"},{"text":"若是以可能無法奪得金牌來當作拒絕的理由十分的荒謬，並且對於各項運動的發展都非常不利，不應該以是否能獲得獎項來作為准許參賽的理由跟依據，這樣在一個新興的運動或者是台灣未曾涉略或是經驗較少的運動都永遠不可能能取得國際上的進展","time":"2026-07-11"},{"text":"請國家支持各式運動的發展及運動員養成所需資源","time":"2026-07-11"},{"text":"真心認為不應因為選手不具備奪牌的實力而剝奪他們累積經驗的機會，相對的，如果沒有機會參加國際賽事累積經驗又怎麼可能在未來有機會在國際舞台奪牌呢？","time":"2026-07-11"},{"text":"選手經過大量的時間訓練，好不容易拿到大賽的參賽資格，卻因運動部的一句：不會奪牌，而取消資格，替選手感到不值。並且沒有先前的比賽經驗，怎麼從中研究如何更進一步以及傳授經驗給後輩、未參賽經驗的選手。或許不會有得牌的可能，但累積選手的經驗也非常重要，尤其是在新興運動發展的過程中必要的環節，並且還能帶動國民參與的風氣。總之，希望能夠修正參賽原則，使選手能順利參賽。","time":"2026-07-11"},{"text":"參與國際賽事也是增強實力的關鍵之一","time":"2026-07-11"},{"text":"應該保障運動員的出賽權益","time":"2026-07-11"},{"text":"獲得參賽資格就是有機會奪冠，請不要用自己得眼光限制選手的發揮","time":"2026-07-11"},{"text":"支持合理修法 為選手爭取合理權益","time":"2026-07-11"},{"text":"有取得資格，就有代表國家出席的權利。「奪牌希望不足」本身就不具備客觀性，試都不試怎麼可以肯定不會奪牌？縱使沒奪牌，可增加選收的經驗值，以提升你們所謂「奪牌機率」，如果奪牌了，又有誰可以出來為了當初那句奪牌希望不足而負責？得牌不是我們唯一要關注的事情，是整個國家必須建立一個好的運動環境與風氣。","time":"2026-07-11"},{"text":"選手能夠走到國際賽事實屬不易，將人才推向世界需要各方領域合作，希望國家能夠重視體育環境發展的未來","time":"2026-07-11"},{"text":"不應讓非專業人員以不透明的方式評估運動員的努力，台灣誰比他們強？不應剝奪選手參賽權利","time":"2026-07-11"},{"text":"支持","time":"2026-07-18"},{"text":"支持，參賽才有機會奪冠。","time":"2026-07-18"},{"text":"我希望每一個為國出賽爭光的選手們都可以毫無後顧之憂的前出去爭取榮耀，所以我們國家也就更應該保障選手們的權益以及專項賽事規劃以及福利福祉，這樣才是對選手們最好的尊重以及他們應得的權益，希望國家未來能夠更好保障各個專項選手們出賽的福祉","time":"2026-07-20"}]},"高雄市湖內區":{"county":"高雄市","town":"湖內區","count":1,"comments":[]},"新北市汐止區":{"county":"新北市","town":"汐止區","count":50,"comments":[{"text":"建議修改規章，不要用原先的評斷方式，現在很多新的運動以及年輕的運動員，更應該鼓勵大家多多參與國際賽事，就算沒得獎也可以在參加國際賽事時增加更多能見度還有技術交流，不應該建立在提高奪牌率的前提下去評估是否讓其參賽，尤其台灣一直以來在運動上常有一些協會的負責人並不了解運動狀況，前期不好好培養輔助幫忙，卻在最後得名後才想分一杯羹? 這種心態建議從裡到外都好好改善，還給運動選手一個優良健康的環境","time":"2026-07-08"},{"text":"比賽哪有人還沒比，就說不能奪牌就不比的？！\n只要給參賽，資金也很常選手要自己煩惱，拜託別再用那些爛理由了…","time":"2026-07-08"},{"text":"新興運動應該要有適當專業的評估","time":"2026-07-10"},{"text":"真的需要修法改善，一般運動的奪牌標準不適用於衝浪，不應讓選手的努力白費","time":"2026-07-10"},{"text":"在上位者的無能，連累年輕選手的生涯...年長的我們卻無法影響上位者，現在只能用微弱的力量嘗試能夠改變~也許只有真正的運動員當總統才會有所改變吧","time":"2026-07-10"},{"text":"大賽經驗是由很多實際比賽才能累積的，另臺灣的國際比賽運動多樣性其實也蠻低的，運攀抱石是適合亞洲人的運動應該加以推廣。","time":"2026-07-10"},{"text":"支持","time":"2026-07-11"},{"text":"選手既然有能力取得參賽資格，讓他們嘗試看看看有何不可？也許狀況很好，再加點運氣，我們國家的選手也可以奪得獎牌。攀岩抱石並不是廣 出去比賽的權利","time":"2026-07-11"},{"text":"我認為每個人每個選手如果有踏上國際舞台的機會，國家應不吝嗇地將選手推上舞台並給予支持，臺灣的確不是以運動出名的國家但不代表我們該無視那些有能力的孩子們！","time":"2026-07-11"},{"text":"選手努力就是想要站上國際舞台為自己發光也讓世界看見台灣，憑什麼剝奪他們的努力權益","time":"2026-07-11"},{"text":"附議","time":"2026-07-11"},{"text":"爛政策應與時俱進","time":"2026-07-11"},{"text":"保障已取得參賽資格選手之參賽權益","time":"2026-07-23"}]},"臺南市善化區":{"county":"臺南市","town":"善化區","count":14,"comments":[{"text":"非常支持","time":"2026-07-11"},{"text":"支持修正運動部《我國參加國際大型運動賽會組團參賽原則》，保障已取得參賽資格選手之參賽權益！","time":"2026-07-11"}]},"高雄市楠梓區":{"county":"高雄市","town":"楠梓區","count":32,"comments":[{"text":"拒絕內定拒絕黑箱","time":"2026-07-10"},{"text":"選手若依照國際規定取得比賽資格，就應該能代表台灣出賽，無論結果如何，他們都為自己爭取到機會和經驗，也有助於未來持續發展","time":"2026-07-10"},{"text":"支持","time":"2026-07-11"},{"text":"覺得如果有符合出國參賽資格就應該要給予機會，替台灣爭取榮耀","time":"2026-07-11"},{"text":"確實應給予有實力且努力的預備選手們公平的待遇","time":"2026-07-11"},{"text":"Just do it and never give up","time":"2026-07-11"},{"text":"運動是自由的，只要肯努力每個人都該有機會","time":"2026-07-11"},{"text":"請讓更多熱愛運動的人有更多比賽機會，不應該埋沒人才！","time":"2026-07-11"}]},"彰化縣彰化市":{"county":"彰化縣","town":"彰化市","count":42,"comments":[{"text":"選手取得比賽資格代表有實力\n憑什麼用能力不足來否定其參賽權？\n只想要有現成的奪牌機器而不培養其經驗\n非常垃圾的選訊制度必須改革","time":"2026-07-09"},{"text":"我覺得不應該因為他們沒有奪牌機會就不去比賽，選手們好不容易爭取到參加國際賽的資格為什麼不讓他們去嘗試累積經驗，或者是和更多國際選手交流，搞不好會學到很多，也可以讓世界看見台灣，讓台灣增加國際曝光度，總之我覺得不應該剝奪選手們拼死拼活得到的機會","time":"2026-07-11"},{"text":"我覺得此案提出的問題非常好，我們不能讓還沒上場過得選手因為政府自己的想法就隨意判斷他是否具有獲獎資格，比賽這種東西就是沒有「一定」，只要參賽就有機會，就算沒得名也是對選手本身一次很大的經驗，因此我要附議此提案。","time":"2026-07-11"},{"text":"不去看廣闊的世界又怎能進步呢","time":"2026-07-11"},{"text":"請給選手一個機會！","time":"2026-07-11"},{"text":"若過度關注選手本身成績而自行判斷選手沒有奪牌的可能性就擅自取消參加者可以往前邁進的重要一步，我認為國家沒有資格這麼做，為了國家而參賽他們必然是付出了非常大的努力，國家沒有關注這一項運動且不了解，不曉得他們為此付出了多少的努力，就因為如果他們輸了國家面子過不去就擅自取消，那如果是你努力了這麼久，眼淚、汗水、血都流了這麼多換來的卻是國家這樣的安排，我相信無論是誰都會有所不甘和對國家的失望，國家若只有對有名的國際運動，比如：棒球、桌球、籃球等付出心力卻不去看重新興運動，那國家所說的〔全民運動〕意義何在？表面這麼說結果做的卻是這種剝奪權益到行為，讓那些原本因為這番話而感到有希望的人且去付諸行動的人結果因為國家的〔不具有奪牌資格〕就這樣取消了，為甚麼新興運動要因為之前沒有國際比賽的相關經驗然後被你們直接判定沒有資格參賽，正確不是應該要讓他們出去多多的參賽、獲取更多的經驗並對訓練項目有所改善，是否有一天也能讓這項運動成為國家的代表運動？就這麼阻斷掉選手的未來，不出去獲取更多的比賽經驗、和對手競爭的機會是不會進步的，而他們就停在了這一步，所有的努力就這樣化為泡沫，那他們努力的意義在哪？請加以修正","time":"2026-07-11"},{"text":"辛辛苦苦拿到參賽資格\n卻被自己的國家否定真的很難過\n請給努力的選手們一個機會","time":"2026-07-11"},{"text":"我自己也曾經參與國際賽事三次，雖然不是運動類，至少我去看過這世界，但由國家告訴我不具有拿到前三名資格，是非常讓人遺憾的事","time":"2026-07-11"},{"text":"台灣需要更好","time":"2026-07-11"},{"text":"沒有奪冠資格就沒有參賽資格到底是怎樣，我不能出國累積經驗嗎，難道那些沒奪冠的選手都是白癡嗎。","time":"2026-07-11"},{"text":"我支持本提案。運動員的黃金參賽期十分有限，一次國際賽事可能是多年努力才換來的機會。既然已依照制度取得參賽資格，就應受到制度保障，而不是承擔非自身因素所造成的不確定性。唯有維護已取得資格選手的參賽權益，才能展現政府對運動員的尊重，也能維護選拔制度的公平與公信力，讓所有選手相信努力終究會獲得應有的保障。","time":"2026-07-11"},{"text":"認同，讓國家代表隊制度更符合現代運動治理","time":"2026-07-23"}]},"臺南市安南區":{"county":"臺南市","town":"安南區","count":45,"comments":[{"text":"明明亞洲第二 卻不能出去 很誇張","time":"2026-07-08"},{"text":"都已經是擁有國際賽事實力的選手，就表示已足夠證明有奪牌希望，而不該再透過模糊不清、另外的遴選方式剔除已有足夠實力證明的選手的參賽資格！","time":"2026-07-08"},{"text":"支持選手參加比賽","time":"2026-07-10"},{"text":"應讓獲得獲得資格賽的選手，站上舞台，累積經驗，爭取奪牌","time":"2026-07-11"},{"text":"看看這次FIFA維德角的表現，再看看這個條文，誰會覺得這個條文是合理的","time":"2026-07-11"},{"text":"我要能夠站上世界舞台，累積經驗，才能有更多奪牌的經驗，如隨意剝奪選手比賽的權利，那不就也等同於，在否定他們的努力","time":"2026-07-11"},{"text":"連比賽都不去，要怎麼累積經驗！沒有經驗又怎麼能會有奪牌可能","time":"2026-07-11"},{"text":"我絕對支持我國運動選手追夢，這才是國家成立此部門的真正意義。期望我國運動選手能大展鴻圖且愈加進步，無論是否有奪牌機會都能拓展視野。希望我的微薄之力有幫助！","time":"2026-07-11"},{"text":"任何運動選手都應該有權利出國比賽，為什麼還沒比賽就已經判斷他輸了？那以後台灣的運動選手路只會越走越小，請支持選手出國比賽，他們會越來越進步，請當他們最堅強的後盾，不要扯他們後腿","time":"2026-07-11"},{"text":"如果選手已經達到國際賽的參賽資格，只因被認定「沒有奪牌希望」就失去機會，可能會讓人認為制度過於重視結果，而忽略努力與培養人才。","time":"2026-07-11"},{"text":"支持任何一位有實力的選手都能站上國際舞台！","time":"2026-07-11"},{"text":"支持讓所有有能力追夢選手累積賽事經驗","time":"2026-07-11"},{"text":"運動之文化與風氣 一定是長時間培育出來的\n台灣不乏努力的運動員 雖然還未能在國際上留下佳績 但是是還沒成功 並不是不會成功\n希望在資格 資金 政府能給予支持與機會 \n慢慢來 不要只看當下的失敗\n運動體系需要滿滿建立信心","time":"2026-07-11"},{"text":"我認為選手應該有權力出去國外比賽 不應該受到能力排名限制","time":"2026-07-11"},{"text":"建議增加如無法派員參賽，應提早告知運動員，不服處分者，亦有保留適當之時間及管道可供反應，並召開委員會再次審議派員妥適性，避免再次留下無法參賽的遺憾。","time":"2026-07-12"},{"text":"🫴","time":"2026-07-12"},{"text":"各項運動競技方式與名次的呈現不一 不能以偏概全，更應評估每個項目得獎辦法來設定未來比賽指派標準。 而且大賽事更應拍選手參加競賽。","time":"2026-07-16"},{"text":"希望選手能夠順利進行國家隊出賽","time":"2026-07-20"}]},"臺中市大里區":{"county":"臺中市","town":"大里區","count":38,"comments":[{"text":"支持","time":"2026-07-10"},{"text":"選手就應該出去參賽累積經驗，他們都是我國最好的小孩與國民","time":"2026-07-11"},{"text":"選手真的需要累積經驗\n就算只是踩上賽場也是重要的經驗累積\n請運動部更重視人才培養\n可怕的亞洲家長教育觀念該改改了","time":"2026-07-11"},{"text":"努力爭取的機會，不應該被限制","time":"2026-07-11"},{"text":"國家不應以這種形式取消了選手們的參賽機會間接否定了他們的努力","time":"2026-07-11"},{"text":"新興運動之運動員努力讓台灣人更能追上世界的腳步，讓世界看到我們，不該因為政策問題而讓運動員的努力付諸流水。","time":"2026-07-11"},{"text":"為什麼取消資格是否可以更加公開讓社會大眾知道，原因也請合理，不然不應該埋沒潛能","time":"2026-07-11"},{"text":"支持任何選手都可以有參賽權，並且得到國家支持與贊助","time":"2026-07-11"},{"text":"如果沒有持續在國際賽場上的經驗，之後要如何持續推動該項運動，將經驗複製給為了的選手？","time":"2026-07-11"},{"text":"沒有奪牌的希望，也不該剝奪選手的基本權益！","time":"2026-07-11"},{"text":"我認同應該讓取得比賽資格者有更高的參賽機會，有更多機會參與比賽相信台灣的實力與眼界會更遼闊。","time":"2026-07-11"}]},"臺南市永康區":{"county":"臺南市","town":"永康區","count":42,"comments":[{"text":"若僅依照奪牌為標準派隊的話，國內競賽和國際競賽的水準落差將會越來越大，把臺灣選手越往後拉扯。\n提供國際大型賽事機會，累積選手經驗對培育有很大的幫助","time":"2026-07-09"},{"text":"我覺得這樣不合理，希望能改善","time":"2026-07-10"},{"text":"選手的資格不應該被剝奪，所有選手都具有參與的權利，不應只因為未具奪牌能力而被取消、放棄。應該讓選手們參與國際賽事，累積豐富經驗、提升自我。","time":"2026-07-11"},{"text":"累積經驗對一個運動員真的非常重要","time":"2026-07-11"},{"text":"保障選手從公平公正的路徑取得參賽資格","time":"2026-07-11"},{"text":"還妄想出戰即巔峰哦？ 沒國際大賽經驗是能得什麼牌，有機會就多多累積經驗","time":"2026-07-11"},{"text":"支持岩蓁，你不能因為不看好就剝奪他們正當在國際上比賽取得的參賽資格。中華隊打12強的時候也一堆人在看衰會輸阿，怎麼不說因為沒機會得名就不派人參加了。因為攀岩在台灣還是冷門運動，那不是更需要透過政府的力量孕育在地的能量，提高風氣嗎。連運動項目都搞階級歧視真的很可悲。","time":"2026-07-11"},{"text":"希望選手們能夠順利出賽，不應該就這樣否定他們的努力！！","time":"2026-07-11"},{"text":"選手為了取得參賽資格，往往投入多年時間訓練，甚至犧牲學業、工作與生活。如果已經依照公開、公平的選拔制度取得資格，卻因為後續規定或其他因素失去參賽機會，不僅影響選手權益，也會降低選拔制度的公信力。因此，應明確保障已取得參賽資格選手的參賽權，在特殊情況需要更動名單時，也應訂定透明、合理且公開的標準，兼顧國家利益與選手權益，讓選手能安心備戰，也提升我國體育制度的公平與信任。","time":"2026-07-11"},{"text":"怎麼可以這樣辜負這些努力不懈的人\n因為一句不具備奪牌資格而不派遣出賽亞運\n是一件羞辱國家的事","time":"2026-07-11"},{"text":"阻礙運動員發展的不合理條款必須修正","time":"2026-07-11"},{"text":"支持","time":"2026-07-23"}]},"新北市貢寮區":{"county":"新北市","town":"貢寮區","count":2,"comments":[{"text":"支持修正運動部《我國參加國際大型運動賽會組團參賽原則》，明確保障已依國際賽事規定取得參賽資格選手的參賽權益，避免類似事件一再發生。","time":"2026-07-09"}]},"新北市八里區":{"county":"新北市","town":"八里區","count":7,"comments":[{"text":"支持。沒有任何事是可以一蹴可幾的！沒有推廣和基礎培育的養成環境，又如何冀望能跟上國際水準？而運動賽事的成績，除了選手本身的能力外，也有許多變因存在，也許能以數據評估，但未必就會是實際結果。","time":"2026-07-09"},{"text":"支持","time":"2026-07-11"},{"text":"好不容易可以去比賽國家卻不讓 不公平","time":"2026-07-11"},{"text":"要知道運動員都很認真準備比賽！\n不要抹煞他們的努力！！\n台灣運動要站上國際舞台，讓他們發光發熱，讓他們有合理權益！！","time":"2026-07-11"}]},"屏東縣內埔鄉":{"county":"屏東縣","town":"內埔鄉","count":9,"comments":[{"text":"國家因主觀選手不具奪牌實力而拒絕排遣。\n我認為應該把參賽權留給選手決定，國家決定是否提供選手參賽的金援或各方面援助。\n選手可以自行籌措資金或其他資源以順利參加比賽。","time":"2026-07-11"}]},"新北市蘆洲區":{"county":"新北市","town":"蘆洲區","count":52,"comments":[{"text":"支持做對的事，運動員需要更多機會參加國際賽事。","time":"2026-07-09"},{"text":"支持本提議想法","time":"2026-07-10"},{"text":"支持運動選手","time":"2026-07-10"},{"text":"希望選手能夠順利進行國家隊出賽","time":"2026-07-10"},{"text":"支持任何選手參與外國賽事","time":"2026-07-10"},{"text":"支持每個努力付出的選手都有參與比賽的權益","time":"2026-07-11"},{"text":"希望我國國家隊能順利參加比賽","time":"2026-07-11"},{"text":"支持有參與國際比賽資格的選手，得以出國比賽，修改不合時宜相關事宜。","time":"2026-07-11"},{"text":"支持台灣選手權益","time":"2026-07-11"},{"text":"努力了那麼久，可以參家比賽看看世界賽真正的樣貌也是實戰經驗不可以錯過的部分，經驗跟眼界都是非常重要的一部分！","time":"2026-07-11"},{"text":"我支持這項提案，因為我認為選手只要依照國際規定取得奧運、亞運等大型國際賽會的參賽資格，就代表已經通過公平競爭，應該有代表國家出賽的機會，而不是因為被認為奪牌機會較低，就失去參賽資格。每位選手都花費多年時間訓練，付出大量心力與努力，若最後因行政裁量而無法參賽，不僅影響個人權益，也可能打擊其他選手投入運動的信心。\n\n此外，國際賽事的價值不只有爭取獎牌，也包括累積國際經驗、提升競技能力，以及讓更多運動項目被社會看見。尤其是新興運動，更需要透過國際舞台累積經驗與曝光，才能培養更多人才。如果只以奪牌作為主要考量，將不利於台灣運動的長遠發展。\n\n我也認為，相關單位應公開選訓及派員標準，若已取得資格的選手未獲派遣，應清楚說明理由，並提供申復機制，讓制度更加透明、公平。追求好成績固然重要，但保障選手權益、尊重努力成果，以及建立公開透明的制度，同樣是現代運動治理的重要價值。我希望透過這項提案，讓台灣的代表隊制度更加公平，也讓更多努力的選手有機會站上國際舞台。\n\n如果只是因為無獲獎機會就取消選手的參賽資格，談何民主？","time":"2026-07-11"},{"text":"任何比賽就是要比才有機會\n不給機會如何知道自己在國際賽事上的能力呢\n如果剛好遇到超常發揮的時候\n一舉得冠也不是不可能啊！","time":"2026-07-11"},{"text":"出國吧","time":"2026-07-11"},{"text":"支持運動選手已努力取得的參賽資格，能得到出賽的機會。","time":"2026-07-11"},{"text":"無","time":"2026-07-12"},{"text":"為什麼要剝奪他們多年苦練的成績,自己努力訓練來的門票就被否決了~","time":"2026-07-14"},{"text":"支持我國運動發展與合理的選手培訓資源。","time":"2026-07-23"},{"text":"身為運動員，非常能感同身受姚廷蓁選手現在的錯愕與無力。對運動員來說，黃金的競賽生涯就那幾年，每一天都是用汗水與傷痛換來的。好不容易靠實力拼到個人綁定的亞運席次，最後卻因為僵化的遴選與派隊制度被硬生生剝奪參賽權。制度應該是運動員的後盾，而不是抹煞夢想的絆腳石。支持選手發聲，體育部與相關單位應該正視這個問題，給選手一個合理的交代！","time":"2026-07-18"}]},"基隆市中山區":{"county":"基隆市","town":"中山區","count":5,"comments":[{"text":"運動產業本就身處弱勢，政府應多鼓勵選手參與國際賽事，而非以不具奪牌潛力拒絕其出賽。","time":"2026-07-12"},{"text":"國家不該以奪牌與否功利角度評估是否出隊，若選手已取得參賽資格，國家則應排隊以利該運動之發展","time":"2026-07-13"}]},"新北市板橋區":{"county":"新北市","town":"板橋區","count":140,"comments":[{"text":"支持修正，確保障「已依國際賽事規定 取得參賽資格選手的參賽權益」，避免類似事件一再發生。","time":"2026-07-09"},{"text":"都已經有參賽資格了，還要阻止選手出去拿成績，這是什麼鬼政策","time":"2026-07-09"},{"text":"請保障各項運動選手的參賽權益。","time":"2026-07-09"},{"text":"支持選手的努力才爭取到的資格，不該預計他們實力不會得到前三名，而拒絕他們出國比賽","time":"2026-07-10"},{"text":"保障選手參賽權益，避免努力取得國際資格後仍遭行政裁量排除","time":"2026-07-10"},{"text":"斯煒懶人包：\n1. 這次名古屋亞運攀岩參賽資格由兩場資格賽產生(去年首爾世界錦標賽、今年四月中國亞洲錦標賽)，各項目只有15個名額，台灣有3位選手取得參賽資格：林嘉翔(男子抱石)、姚廷蓁(女子抱石)、范植恩(男子先鋒)。\n2. 運動部以台灣選手\"亞運資格賽(亞錦賽)名次不佳，經評估無法奪牌\"為由，決定台灣不參賽。\n3. 這3個名額會遞補給其他國家。\n4. 台灣山岳協會向運動部要決議結果，只想知道我們的選手到底能不能出國參賽，結果運動部都不回覆，等到記者去問才發新聞稿。\n\n結論：台灣選手用實力證明自己可以去亞運為台灣參賽，但是台灣政府深怕他們拿不到前三名，所以不讓他們比。\n\n請大家一起來覆議修正《我國參加國際大型運動賽會組團參賽原則》，因為有一群人燃燒生命卻敗給了這種低能條文，這些官員還能大言不慚地用它來卸責，有夠可悲。","time":"2026-07-10"},{"text":"他們肯為台灣出戰，為何不讓他們站在世界的舞臺上，代表台灣，讓世界看到他們也看到台灣","time":"2026-07-10"},{"text":"附議","time":"2026-07-11"},{"text":"支持不扼殺新興運動選手發展的可能性","time":"2026-07-11"},{"text":"選手加油 為正確的事附議","time":"2026-07-11"},{"text":"政府應保障運動選手經由國際標準管道取得之比賽資格，給予派遣出國比賽機會，而不是已「不具有奪牌實力」等片面說詞，剝奪頂尖選手出外比賽之權利，間接的無法提升各領域之頂尖選手之實力及見識。","time":"2026-07-11"},{"text":"運動員們付出了這麼多的心力去練習，我相信他們比賽的意義並不只是為了得名，而是真的熱愛這份運動。如果因為不能得名而不讓他們參加比賽，等於直接剝奪了他們追求熱愛的機會，這是不公平的。","time":"2026-07-11"},{"text":"任何一個人想要奪得獎牌都是要付出努力地 需要累積實力的機會 也需要被看見的機會","time":"2026-07-11"},{"text":"看到有追蹤的攀岩選手在說我才知道 現行規則非常不合理 必然改變","time":"2026-07-11"},{"text":"我認為不論能否得牌，具備參賽資格就應有參賽的權力。","time":"2026-07-11"},{"text":"希望可以尊重選手這段時間的付出與努力，而不是一味的定義選手因不能奪牌而不被派遣出賽。","time":"2026-07-11"},{"text":"應該支持選手代表國家出國比賽，並藉此累積更多參賽經驗。","time":"2026-07-11"},{"text":"食古不化的政策就是要改變！","time":"2026-07-11"},{"text":"每一個有能力走到國際賽的運動員都應該有資格站上舞台，隨著每一次的比賽累積經驗，才有可能站上頒獎台，更何況運動賽事本來就沒有絕對的結果，我認為「沒有奪牌的機會」這個標準本身就不合理，哪怕機會渺茫都不可能是零，都應該勇於嘗試和挑戰，這才是正確的運動家精神。","time":"2026-07-11"},{"text":"不合理的法條到底要存在到什麼時候？","time":"2026-07-11"},{"text":"希望所有能讓世界看見台灣的方式都不會受到打壓 更何況我們是最應該支持台灣的台灣人","time":"2026-07-11"},{"text":"​本人全力支持此訴求。2026名古屋亞運新興項目（如攀岩、衝浪）的組團爭議，核心死結在於國際賽制限制「只能由國家奧會統一報名」，選手完全無法自費個人參賽。\n​當國家壟斷了唯一的報名管道，卻用僵化的「唯獎牌論」KPI，將贏得國際總會亞洲限額配額（Quota）的頂尖選手擋在門外，這無異於由政府直接沒收選手的職業生涯。\n​長期放棄派隊，將導致台灣在新興運動上面臨國際邊緣化的實質危機：缺席國際賽事會中斷積分累積，讓國際組織質疑台灣的發展決心，進而縮減未來給予台灣的席次，使未來的比賽環境更加嚴峻。\n​既然選手與民間願意自籌經費，運動部就應盡到主管機關的行政協助責任。強烈建請修正「國際大型運動賽會組團原則」，明定「凡實質取得國際總會限定參賽配額者，即具備代表隊資格」。政府應放寬行政審查、統一協助報名，履行國家應有的支持義務，不要成為扼殺新興運動產業與選手國際生存空間的最後一關！","time":"2026-07-11"},{"text":"這項規定內容過時，且參賽經驗也是選手奪牌必要的訓練之一，更是他們體驗人生的權利","time":"2026-07-11"},{"text":"當運動員爭取到相對應得國際資格的時候，為什麼不能讓他去試一試，只是因為這項運動不是「台灣」的，多數人在體驗和玩樂的運動項目嗎，請跟加重視一點好嗎。","time":"2026-07-11"},{"text":"希望不要因此抹滅掉選手們的努力，大家辛辛苦苦努力拼到比賽的資格，卻因為台灣本身的規定沒辦法參賽，真的很不尊重運動員，希望可以更尊重代表台灣參加國際比賽、運動員的權益，讓他們的聲音被看見。","time":"2026-07-11"},{"text":"運動員透過國際組織的規範取得參賽資格後，國家的角色應該是提供支持與派遣，協助選手代表台灣站上國際舞台，而不是以國內法規或行政限制，阻礙已經具備國際參賽資格的運動員發展。\n\n每一位選手都投入了大量時間、金錢與心力，只為爭取一次站上國際賽場的機會。當選手已符合國際賽事的資格標準，國家更應該以培育人才、提升國家競技實力為優先，建立公平、透明且一致的派遣制度，讓有能力的選手能夠代表台灣出賽，而非因制度限制錯失寶貴的發展機會。\n\n保障選手的參賽權益，不僅是對個人努力的尊重，更有助於提升台灣在國際體壇的競爭力與能見度。","time":"2026-07-11"},{"text":"如果身在公門，相信一定都知道台灣政府其實還算富裕，相信只要得到適當的資源分配，一定足夠。\n運動協會存在太多派系和經費資源分配不均的問題，如果選手還要花這麼多心力去搞這些鳥事，要如何好好訓練，為自己和國家爭光。","time":"2026-07-11"},{"text":"這麼努力取得資格了 不讓去試試怎麼知道呢？而且沒有得到牌 也可以得到寶貴的經驗啊！","time":"2026-07-11"},{"text":"有機會應該要上場試試累積經驗，至少不要取消資格，補貼較少也好過連去的資格都沒有…","time":"2026-07-11"},{"text":"法案要與時俱進 不要阻擋年輕人的夢想","time":"2026-07-11"},{"text":"支持運動發展 不改喪失運動員權益","time":"2026-07-11"},{"text":"既然選手有拿到名額，也願意自費出賽，實在是沒有理由阻擋。既然拿到資格那參賽有甚麼不合理","time":"2026-07-11"},{"text":"支持出賽","time":"2026-07-11"},{"text":"加油！","time":"2026-07-11"},{"text":"希望選手能夠順利進行代表國家出國比賽","time":"2026-07-11"},{"text":"希望國際賽場上飄揚我國國旗，接觸攀岩運動也有五年了，這位選手也認識並時常看到在岩館，或者其他項目比賽。大力支持","time":"2026-07-12"},{"text":"支持合理修法 為選手爭取合理權益","time":"2026-07-12"},{"text":"希望台灣的運動未來不是只看奪牌！而是任何人的可能性！","time":"2026-07-23"},{"text":"附議","time":"2026-07-23"},{"text":"支持「修正運動部《我國參加國際大型運動賽會組團參賽原則》，保障已取得參賽資格選手之參賽權益」的覆議。","time":"2026-07-23"},{"text":"現行規定太偏成績導向了，值得修改","time":"2026-07-18"}]},"臺北市內湖區":{"county":"臺北市","town":"內湖區","count":114,"comments":[{"text":"支持修正，確保障「已依國際賽事規定 取得參賽資格選手的參賽權益」，避免類似事件一再發生。","time":"2026-07-09"},{"text":"我認同更多機會分配給選手，而不是為了拿到獎牌，將所有資源都投入在單一選手上","time":"2026-07-09"},{"text":"支持選手！","time":"2026-07-09"},{"text":"附議","time":"2026-07-10"},{"text":"每個辛苦栽培的種籽都是國家的希望！\n時代在改變，競技千變萬化！\n有機會卻不讓上場，制度應被重視檢討！","time":"2026-07-10"},{"text":"支持台灣運動選手走向國際","time":"2026-07-10"},{"text":"1.開放自籌經費/自訂參賽計畫 2.先參賽 後補款 3.外卡專案輔導壓哨送件 4.全盤預設大名單 \n/擴充名單/寧多勿少","time":"2026-07-10"},{"text":"希望讓台灣有實力的選手 站上國際體育的舞台。讓世界看到台灣","time":"2026-07-10"},{"text":"修正運動部《我國參加國際大型運動賽會組團參賽原則》，保障已取得參賽資格選手之參賽權益","time":"2026-07-10"},{"text":"靠自己實力得到參賽資格，卻無法參賽，是多麼荒謬且不合理。","time":"2026-07-11"},{"text":"缺經費的話可以再向民眾募資，我相信大家一定都很樂意的，擁有高級賽事的參賽資格，不參加怎麼能讓運動進步，如同指望在沙漠中長出玫瑰一樣","time":"2026-07-11"},{"text":"什麼叫運動家的精神，我相信大家從小參加各種運動會都會被教導說：輸贏不是重要，重要的是過程，你在這過程中學習到了什麼。\n這是我們從小的教育，也是很多運動家刻在骨子裡的一句話，我相信這句話不是在講假的，為什麼人在追夢的過程中要害怕失敗呢？好不容易拿到的大好機會就這樣白白流失，不僅僅是讓臺灣證明自己的一個機會就這樣沒了，更是讓努力了很久的運動家覺得不公平，甚至有些人是花了一生在為運動而活，\n如果一個人甚至是一個國家，只是單單害怕去比賽拿不到名次而直接選擇不參加，這真的是一個好的選擇嗎？","time":"2026-07-11"},{"text":"希望能保障已獲得國際賽參賽資格選手的參賽權，在未達選訓標準的情況下，也能有多元的救濟管道，例如自籌資金等，讓選手及相關單位都能累積寶貴的國際賽經驗，進而轉化為推動運動產業長期發展的重要基石","time":"2026-07-11"},{"text":"提供機會與平台給選手應是支持台灣運動發展的第一步","time":"2026-07-11"},{"text":"如果沒有開始 要怎麼變強","time":"2026-07-11"},{"text":"我認為，選手能取得國際賽事參賽資格，是憑藉長時間的努力、訓練與實力換來的成果。如果已經符合國際規則，國家就不應再以「奪牌希望不足」作為取消參賽機會的理由。\n沒有人一開始就能站上頒獎台，實力、經驗與信心，都是透過一次次的國際賽事累積而來。如果連嘗試的機會都被剝奪，又要如何培養出未來有能力奪牌的選手？\n每一位取得資格的選手，背後都付出了無數的汗水、時間與堅持，也承受了許多挫折，只為了能代表國家站上國際舞台。希望制度能更加重視選手的參賽權益與運動精神，給予每一位靠自己取得資格的選手公平的機會，而不是讓他們的努力止步於最後一道行政門檻。\n真正值得支持的制度，不應只看見奪牌的結果，更應尊重每一位靠自己爭取到資格、勇敢站上世界舞台的選手。","time":"2026-07-11"},{"text":"支持！！","time":"2026-07-11"},{"text":"每個賽事都要多參加才能有效提升奪冠率，而且誰知道會不會突然出現大爆冷的奪冠者，人有無限可能","time":"2026-07-11"},{"text":"取得資格就該派去，不然之前網球爭議人物這麼大還不是派去，主關標準太誇張了","time":"2026-07-11"},{"text":"此提議有助於台灣運動界發展","time":"2026-07-11"},{"text":"希望選手可以順利出賽","time":"2026-07-11"},{"text":"加油！","time":"2026-07-11"},{"text":"獲取國際資格的選手不應被剝奪參賽資格","time":"2026-07-11"},{"text":"身為一名攀岩愛好者，深刻體會每一位運動員為了站上國際舞台，背後付出了多少常人難以想像的汗水與心血。看到我國優秀選手明明憑實力拼到了參賽資格，卻因為僵化的行政體制、組團參賽原則的程序瑕疵或資源分配問題，在最後關頭被擋在門外，實在令人感到無比憤怒與痛心。\n\n國家成立運動部的核心目的，應是作為選手最強大的後盾，而非成為阻礙選手前進的絆腳石。選手的運動生涯黃金期極為有限，每一次錯失國際大賽都可能毀掉多年的努力。強烈支持修正《我國參加國際大型運動賽會組團參賽原則》，全面落實保障已取得資格選手的參賽權益。政府應簡化行政審查、落實資訊透明，將國家資源與決策真正回歸到「以選手為本位」的初衷，別再讓體制抹煞了台灣之光的努力！\n\n複製上述文字後，即可直接貼入附議系統的「支持本提議想法」欄位中。祝附議順利，為台灣運動員加油！","time":"2026-07-11"},{"text":"希望選手可以順利參加國際比賽。\n加油！！！！！！！","time":"2026-07-11"},{"text":"請給運動員機會，而不是扼殺他們的努力。","time":"2026-07-11"},{"text":"運動員的努力不應該因為政府的一句不具奪牌實力就被回絕代表國家出賽一事","time":"2026-07-11"},{"text":"支持修法","time":"2026-07-11"},{"text":"支持","time":"2026-07-11"},{"text":"若運動員已經獲得參賽資格，但國家只依照能不能有好成績來評斷選手能不能參加，連參賽機會都不給又要怎麼提升奪牌實力？","time":"2026-07-11"},{"text":"選手的職業生涯很短, 每一次的比賽機會都很珍貴, 藉由參賽才能把經驗帶回來, 累積並傳承","time":"2026-07-11"},{"text":"希望台灣不要再停留在奪牌思維，而是認真且長期有計劃性的培育運動員們，並讓他們有一個安全舒適平等的環境適性發展。","time":"2026-07-12"},{"text":"至少請提供自費協助參賽管道","time":"2026-07-12"},{"text":"單純用獎牌來評估選手是否能參加比賽，將淪為績效主義之奴隸，該評估標自相矛盾且準著實荒唐，完全不符合運動家精神。若無基本實力、平時參賽經驗之累積，何來奪牌之說？","time":"2026-07-12"},{"text":"針對國內較無公共資源之運動是否應以「發展該運動」的心態允許人才在爭取到了門票後給我們的年輕人一個嘗試的機會，若長此以往我們厲害的運動將越來越少，對國際展示台灣能力的機會將先被我們自己侷限。開放一個管道讓年輕人有更多為國爭光的機會，而不是單純以結果論評估是否應給予參賽權利，免得讓後起之秀們認為在這邊毫無發展機會，心灰意冷。","time":"2026-07-12"},{"text":"當一項國際賽事，取得了國際資格，卻沒有一位臺灣選手可以出賽，我覺得就有需要討論的價值了。","time":"2026-07-13"},{"text":"支持","time":"2026-07-14"},{"text":"政府應該要重視、幫助所有願意踏出那步、努力追逐夢想的人。","time":"2026-07-16"},{"text":"政府不要那麼迂腐\n運動員那麼辛苦 為國爭光\n\n替體育界幫忙 拿出一點誠意努力很難嗎","time":"2026-07-18"}]},"桃園市大溪區":{"county":"桃園市","town":"大溪區","count":11,"comments":[{"text":"支持國家選手出國比賽","time":"2026-07-10"},{"text":"+u","time":"2026-07-11"},{"text":"支持 希望有更多選手去比賽為自己也為國爭光","time":"2026-07-11"},{"text":"所有的國際賽事都是慢慢累積經驗起來才能實現高度與不同的角度去向世界邁進","time":"2026-07-11"},{"text":"國家應該支持人民參 彈性之行政措施協助其組團參賽，保障其既得之參賽權益。\n\n2. 長期法規修正： 運動部應全面檢討並修正該參賽原則，將「透過個人賽制實質取得參賽資格」之態樣，明文納入常態性保障與組團範疇，建立制度化對接機制，解決國內法規與國際賽制之落差。\n\n建請主管機關正視此法規未盡完善之處，儘速重行檢視並修正相關規定，以落實選手權益之保障。","time":"2026-07-11"},{"text":"要支持運動員，需要與時俱進的法規！","time":"2026-07-11"},{"text":"只要能被賽事認可參加權，就是一種肯定！","time":"2026-07-11"},{"text":"這規矩太爛了吧！\n連出去比賽機會都沒有！\n怎麼可能有拿牌機會！","time":"2026-07-11"},{"text":"需要工作經驗所以需要一份工作，但卻被工作經驗的門檻所阻擋。\n需要國際賽成績，卻因為沒有奪牌實力，而無法參與國際賽。","time":"2026-07-11"},{"text":"若以得牌為標準，新興運動或是冬季運動等賽事，在臺灣為小眾運動，不就沒有機會展露頭角與取得經驗值？應已多方考量作為決策，或許這屆不一定可以得牌，但選手獲得的經驗值是可以傳承給自己或是未來的學弟妹。","time":"2026-07-11"},{"text":"已取得國際參賽資格或配額的選手，原則上應予報名；若不派員，須提出具體、可檢驗的理由。\n把「得牌奪金為目標」的單一導向，改為兼顧競技成績、選手權益、新興運動與長期培育。","time":"2026-07-11"},{"text":"支持新興運動，上國際舞臺，讓更多人知道臺灣有厲害的選手及有潛力的選手。","time":"2026-07-11"},{"text":"修改規章，並好好審查預算","time":"2026-07-11"},{"text":"「你去參加這個***嘛？你又不會」\n「你去學這個***嘛？你又學不好」\n「你參加這個***嘛？你又不會贏」\n到底什麼時候才能擺脫這種傳統的陋習心態，政府有資格說不重視體育，但沒資格用這種理由去抹滅選手們的努力","time":"2026-07-11"},{"text":"獲得國際比賽參賽資格就應該要派員參加, 可以有自費或公費的管道, 讓台灣各項運動的選手都能有機會參與國際比賽, 獲得更多經驗來提升戰力, 這應該是很基本的邏輯, 不應該受限於僵化的現行法規","time":"2026-07-13"},{"text":"未達標之選手，可自費參加賽事，若後續有幸創出佳績，比照達標規範給予補償及獎勵","time":"2026-07-14"},{"text":"檢討並優化《我國參加國際大型運動賽會組團參賽原則》。建議針對「已透過國際嚴格資格賽取得席次之選手」給予彈性參賽考量，或增設結合民間、企業資源的參賽配套機制。","time":"2026-07-14"},{"text":"支持具備參加國際賽事資格的選手參加國際賽事，政府要全面支持！","time":"2026-07-16"},{"text":"我附議","time":"2026-07-23"}]},"屏東縣麟洛鄉":{"county":"屏東縣","town":"麟洛鄉","count":2,"comments":[{"text":"就算實力不及其他國家的選手，代表國家出賽還是可以累積比賽經驗，對台灣的運動未來是有幫助的！","time":"2026-07-10"}]},"彰化縣員林市":{"county":"彰化縣","town":"員林市","count":20,"comments":[{"text":"為了台灣有更好的體育環境\n希望運動部能為了衝浪運動改變賽制政策，還有衝浪協會需要有衝浪專業人士任職且查各項經費支出。","time":"2026-07-10"},{"text":"支持運動選手有更多機會上國際賽事","time":"2026-07-11"},{"text":"運動員多年的努力，被這個爛政策扼殺了","time":"2026-07-11"},{"text":"讓選手有機會可以參加更大的比賽不是更能讓他們擁有更加豐富的經驗嗎","time":"2026-07-11"},{"text":"每位選手經過努力，都有機會出國為台灣而代表，也許出去後才知道實力在哪，因此若以得牌希望作為評估，會減少這些選手的視野","time":"2026-07-11"},{"text":"當選手已經依照國際規則取得參賽資格，原則上就應該讓他站上國際舞台；如果國家決定不派員，也應該有透明的理由、事前通知與申覆機會。","time":"2026-07-18"}]},"臺東縣臺東市":{"count 助，也應允許自費或者依比例補助","time":"2026-07-11"},{"text":"努力了就放心的去吧！大家會為選手爭取機會的，加油！！！","time":"2026-07-11"},{"text":"希望台灣選手都能發光發熱！","time":"2026-07-11"},{"text":"支持","time":"2026-07-13"},{"text":"若為有參賽門檻的比賽，獲得比賽的參賽資格(席次制的比賽項目，如：奧運(全項目)、亞運(運動攀登、衝浪……等))，應視為符合“客觀資格”，而非以名次作為遴選標準。","time":"2026-07-13"},{"text":"建議考慮未來運動發展策略","time":"2026-07-23"},{"text":"若選手取得參賽資格，但沒有達到國家的派員標準，希望可以增修自費的法條（相對受傷的風險也讓運動員承擔），讓運動員有機會參賽但也要自我承擔一定的風險、國家也不至於資源無法充分發揮效益。","time":"2026-07-23"},{"text":"建請運動部修正《我國參加國際大型運動賽會組團參賽原則》，使我國參加奧運、亞運等國際大型運動賽會時，除追求競技成績外，也能兼顧選手參賽權益、新興運動發展、基層培育、國際經驗累積與運動多元價值。","time":"2026-07-23"},{"text":"贊同","time":"2026-07-20"}]},"新北市中和區":{"county":"新北市","town":"中和區","count":131,"comments":[{"text":"附議","time":"2026-07-10"},{"text":"支持衝浪運動員","time":"2026-07-10"},{"text":"希望未來可以給選手們更多機會出國累積經驗","time":"2026-07-10"},{"text":"支持","time":"2026-07-10"},{"text":"我就問棒球每次都拿前三？羽球在戴資穎前拿過？","time":"2026-07-10"},{"text":"不給機會去比怎麼知道目前選手實力到哪 比賽場上誰輸誰贏很難說 而且付出汗水的選手們 能夠選擇想參加的比賽是天經地義的吧 希望能保證選手的權益","time":"2026-07-10"},{"text":"選手好不容易取得參賽資格，不應該以沒有奪牌機會讓選手沒機會參加，賽場上有很多其他因素，搞不好我們就奪冠了，亦或者他們可以把經驗及訓練技巧傳授，可以有助於該項運動的發展。","time":"2026-07-10"},{"text":"這樣的規定並不公平。\n\n如果已經取得國際賽參賽資格的選手，卻因為國內另設更高門檻而失去代表國家出賽的機會，那麼台灣的選手究竟要如何累積國際賽經驗、提升競技水準，並達到未來更高的成績要求？\n\n這就像許多公司只願意錄用有經驗的人，卻不願意給新人累積經驗的機會。沒有人願意給機會，又怎麼可能憑空擁有經驗？運動員也是一樣，如果連站上國際舞台的機會都被剝奪，又如何成長、突破自己？\n\n國際競技實力不是靠紙上標準建立的，而是透過一次次與世界頂尖選手交手，累積經驗、調整心態、提升實力。如果連已經取得參賽資格的選手都無法出賽，長遠來看，只會削弱台灣整體競技實力。\n\n我們總希望台灣運動能在國際舞台發光發熱，但如果自己的制度都不願意支持已經取得資格的選手，又如何期待國際成績持續進步？\n\n希望運動部能修正《我國參加國際大型運動賽會組團參賽原則》，保障所有已取得國際賽參賽資格選手的參賽權益。唯有給予選手公平的機會，台灣體育才能培養更多國際競爭力，而不是讓制度成為阻礙選手成長的絆腳石。","time":"2026-07-10"},{"text":"我認為無論參賽選手有沒有具備參賽資格，都這場比賽無關，我們如果要讓台灣更多的運動選手被看見，就必須給予他們練習的機會，就算沒辦法奪冠，也能累積一個經驗，經驗多了，就自然爬上去了。所以我支持此項政策。","time":"2026-07-11"},{"text":"覺得原本的政策太功利主義，沒有給運動選手好的環境怎麼期待會有好成績？","time":"2026-07-11"},{"text":"社會期待的不只是延續過去體育署的競技管理，而是推動全民運動、運動平權、基層培育、運動產業、國際參與與多元發展。若大型賽會組團原則仍以「得牌奪金」為核心，將與運動部所宣示的現代運動治理方向產生落差。修正原則有助於讓制度文字與政策目標一致。","time":"2026-07-11"},{"text":"如果以透過資格賽達標亞運卻因國家認為不具備奪牌實力而取消參賽派遣資格，那應該要新增在同等情況下讓選手自費參賽的機會。要有亞培資格才能出賽亞運這規定太死了，左訓並不是萬能的，尤其是頂尖的選手都有其習慣配合的教練和治療師，在進入高強度的賽前集訓應該是要減少改變訓練環境的不確定性才對。","time":"2026-07-11"},{"text":"難道那些選手的努力就不該被尊重嗎？每場比賽都是選手們努力獲得資格的，卻因為你們認為他的實力不行而拒絕派他們出賽？尊重呢？","time":"2026-07-11"},{"text":"同意","time":"2026-07-11"},{"text":"支持 希望選手可以順利出國比賽","time":"2026-07-11"},{"text":"我在看到reels後覺得非常認同當中的觀點，沒有出國比大型賽事的經驗，哪有機會再大型賽事中奪名，何況運動員已經憑自身實力拿到參賽資格了，憑什麼沒有機會去比賽","time":"2026-07-11"},{"text":"不該罔顧選手努力的心血、鞥，運動部的權力過大了！！","time":"2026-07-11"},{"text":"選上國家隊是努力來的，出國比賽是為國爭光，憑什麼認為我們運動員不行無法奪牌就取消比賽資格？\n完全不合理！請好好善待台灣的運動員，不管有沒有被選入過國家隊都是最棒的運動員。請讓世界更看見台灣🇹🇼","time":"2026-07-11"},{"text":"選手就是要支持","time":"2026-07-11"},{"text":"請不要任意取消選手參賽資格","time":"2026-07-11"},{"text":"讓代表台灣的運動員選手，有被世界看見的機會！","time":"2026-07-11"},{"text":"請尊重每一位取得國際賽資格的選手","time":"2026-07-11"},{"text":"參賽的選手不應該因為奪牌機率小而失去報名的權益，臺灣在許多運動項目也不是從以前就表現很優異，但也是透過各種國際運動賽事的經驗累積進而增加選手們及教練團的表現，因此我認為現行《我國參加國際大型運動賽會組團參賽原則》應該做出修正","time":"2026-07-11"},{"text":"「資格是用汗水拼來的，制度應該是後盾，而不是絆腳石！」\n\n選手在國際賽場上歷經無數血汗、好不容易才取得參賽資格，這是實力的證明，更是國家的榮譽。如果連「已經取得資格」的選手，其基本參賽權益都無法得到保障，這不僅是對選手長年付出的最大打擊，更是制度的嚴重失職。\n\n行政程序絕不應凌駕於運動公平之上。強烈支持運動部立即修正《我國參加國際大型運動賽會組團參賽原則》，杜絕任何因規則模糊或不合理限制而抹煞選手努力的可能。請政府正視民意，落實程序正義，將「保障選手權益」列為最優先考量！","time":"2026-07-11"},{"text":"政府真的爛透了，選手加油！","time":"2026-07-11"},{"text":"支持","time":"2026-07-11"},{"text":"支持選手能參與國際賽事，不以奪牌與否當唯一參賽標準！\n也應列出代表國家參賽標準及救濟程序，客觀跟透明避免爭議。\n希望台灣各項運動選手都能被國際看見。","time":"2026-07-11"},{"text":"希望選手能夠順利進行國家隊出賽","time":"2026-07-11"},{"text":"必須修改規定，支持選手參賽及發展國內攀岩運動生態","time":"2026-07-11"},{"text":"請給年輕運動員一個機會，而非用研判是否能奪牌來裁定是否派遣，當國際大會已認證，國家裁定已以下越上，根本毫無邏輯。","time":"2026-07-11"},{"text":"提高台灣能見度，參與國際賽事亦是重要的一環，既已獲得參賽資格，就代表選手已具備實力與世界一戰，政府應為人民的後盾而非桎梏","time":"2026-07-11"},{"text":"支持修正！","time":"2026-07-11"},{"text":"運動員本身已經拿到參賽資格。國家不應該用國內比賽成績不到拒絕選手到國外參賽，這根本是完全不合邏輯跟公平原則的事情。","time":"2026-07-11"},{"text":"必須公開透明選拔，而不是私下把選手做掉","time":"2026-07-11"},{"text":"支持","time":"2026-07-11"},{"text":"支持 同感深受 自己也是位運動員看不慣這樣 努力那麼久結果連出賽都不讓 希望他們能順利出賽","time":"2026-07-11"},{"text":"多派出國獲得更多經驗，也能對台灣運動界有幫助","time":"2026-07-11"},{"text":"希望可以更支持運動選手們保障選手參賽權益","time":"2026-07-11"},{"text":"以前老舊迂腐的制度趁機改一改吧","time":"2026-07-11"},{"text":"什麼爛網站有夠難附議","time":"2026-07-12"},{"text":"選手既然已獲得國際認證的出賽資格，國內不應以未達奪牌能力而阻擋選手出賽。","time":"2026-07-12"},{"text":"攀岩是很適合台灣人的運動 值得推廣","time":"2026-07-13"},{"text":"希望增修：\n若該項目已達國際標準，但未達國內選訓標準，則補助經費需自籌或以等比例補助。\n\n這樣未達法條標準，但已被國際組織認定可參加的選手，也能透過自籌方式讓國家經費公平分擔，並且增加該運動項目的能見度以及實力。","time":"2026-07-13"},{"text":"保障已取得參賽資格選手之參賽權益","time":"2026-07-23"},{"text":"支持","time":"2026-07-18"},{"text":"若達出國比賽標準，國家都應有補助辦法，提升比賽意願與參賽者家庭的負擔。","time":"2026-07-20"},{"text":"支持好同學的想法。選手們很辛苦，加油！","time":"2026-07-23"}]},"桃園市平鎮區":{"county":"桃園市","town":"平鎮區","count":43,"comments":[{"text":"應讓具備國際水準之選手，實際參與國際賽事提高國內選手之競賽經驗以及能力","time":"2026-07-11"},{"text":"要累積國際賽事經驗才有辦法提升奪牌的機會，還沒累積經驗直接扼殺，很不合理！","time":"2026-07-11"},{"text":"支持","time":"2026-07-11"},{"text":"認真訓練的選手不該因此不能出賽，希望選手的努力不被抹煞。","time":"2026-07-11"},{"text":"希望能讓選手代表國家出賽！讓世界看到台灣！","time":"2026-07-11"},{"text":"支","time":"2026-07-11"},{"text":"我同意","time":"2026-07-11"},{"text":"選手需要更多的機會","time":"2026-07-11"},{"text":"應該給與每位選手公平機會，讓大家都有機會參與國外競賽，以精進自我的實力。","time":"2026-07-11"},{"text":"台灣選手需要多參加國際大賽來獲取經驗，累積經驗才可以獲勝","time":"2026-07-11"},{"text":"選手的努力不該被漠視","time":"2026-07-11"},{"text":"重視運動員的努力並給予支持是國家的義務","time":"2026-07-11"},{"text":"看到自己最喜歡的兩項運動 抱石 跟 衝浪的選手都被這樣亂搞，\n真的是別鬧了，即使自己沒能站上那個舞台，\n但當自己國家的人代表出賽，依然感到光榮無比不是嗎?","time":"2026-07-11"},{"text":"許多項目都是先出去比賽取得亞運參賽資格，然後回國被國家否定無奪牌希望不得參賽?\n那這樣這些出去比賽的運動員在這10幾年努力是為了什麼?這是剝奪參賽權吧?","time":"2026-07-11"},{"text":"目前現行的國際賽事(亞運、奧運等等…)國手遴選制度雖已實行多年\n但畢竟是許多年前所制定的\n希望能隨時代的不同\n可以多多討論與修改\n讓台灣從事新興運動的選手們\n能夠有更多的機會參與到高層級的國際賽事並讓這些運動能夠有更好的發展與未來","time":"2026-07-12"},{"text":"我看到攀岩選手為了能代表台灣，努力爭取亞運資格。這是一項新興的運動，國際上比賽的規則不斷修正、更新。我支持修改目前法規，讓選手能站上國際舞臺，讓世界看到台灣。","time":"2026-07-12"},{"text":"台灣的運動發展需要的是雪中炭！","time":"2026-07-14"},{"text":"我個人也曾是運動員，很理解那種無法出賽的滋味，養兵千日用在一時，訓練了那麼久就是為了能在比賽中取得成績；既然能取得出國比賽資格，就不應該因為被評估無法奪牌而被剝奪參賽權益，現在是代表國家出賽，在新興的運動項目更是要積極爭取大賽經驗，可以更好的培育優秀選手。","time":"2026-07-14"},{"text":"支持努力備賽的選手、團隊能代表國家出國比賽","time":"2026-07-23"},{"text":"我們明明拿到資格了為什麼不能去 那我們練習這麼久去拿資格***嘛","time":"2026-07-23"}]},"臺南市北區":{"county":"臺南市","town":"北區","count":21,"comments":[{"text":"為國爭光，不應挑運動項目","time":"2026-07-10"},{"text":"支持","time":"2026-07-11"},{"text":"這是我理解的。\n今天這場亞運比賽運動項目，不是台灣想參加就參加的。\n你需要在資格賽取得足夠的成績。\n這個國家才能被邀請。\n還句話說是這些選手在國際上代表台灣贏得資格，台灣才能派人去參加。\n\n結果今天台灣說沒有奪牌條件不能去太荒謬了。\n\n我相信自費、哪怕是募資選手們都想去。但是被台灣規定綁住。\n\n如果不是這些選手替台灣贏得資格，今天想去人家也不會讓你去誒。","time":"2026-07-11"},{"text":"會不會得獎不是你們這些官員說的算的\n現在新興運動有夠多\n你們卻一點也不鼓勵台灣選手參賽\n繼續擺爛台灣就是越來越爛\n像你們這些官員一樣爛\n退一百萬步 窮酸刻薄的你們不願意支持參賽\n也不該剝奪選手參賽資格\n至少讓選手自行前往參賽吧\n可悲台灣爛死了","time":"2026-07-11"},{"text":"有透過正式管道取得資格\n就應該鼓勵他們去為國爭光吧\n必須同意✅","time":"2026-07-11"}]},"臺北市南港區":{"county":"臺北市","town":"南港區","count":40,"comments":[{"text":"強烈支持本案。\n\n選手能通過國際總會嚴格的資格賽或拿到配額，代表其實力已獲國際體育界的認可。國內行政機關不應再用主觀的『奪牌希望不足』當作理由，剝奪選手代表國家出賽的機會。這不僅嚴重傷害選手的參賽權益，更踐踏了他們長年訓練的血淚。只要依國際規則拿到門票，國家就應該成為他們最強的後盾，而不是回過頭來審查、限制他們的行政關卡。","time":"2026-07-09"},{"text":"身為這次獲得亞運資格的運動攀登運動員，因為這些原則國家不予派隊，不僅奪走了身為台灣人的權利，也奪走運動員努力後得來的機會。\n2026亞運是對新興運動員最珍貴的機會，是由運動員主動爭取參賽資格，每個人都為了這個資格付出了很多，我們也取得了資格，我們也做到了。\n但這該死的原則，就這樣否決我們的所有努力。\n我們不配參加嗎？我們不夠努力嗎？\n還是因為我們不是那些天才、有天賦的人？","time":"2026-07-10"},{"text":"支持運動選手參賽資格","time":"2026-07-10"},{"text":"支持，選手靠著自己的努力取得資格，因為國家可以支持想要為國爭光的選手們","time":"2026-07-11"},{"text":"任何選手只要符合賽事規定就可參賽","time":"2026-07-11"},{"text":"我是這次亞運獲選選手都國中同學，小時候我們一起練習一起比賽吧，從我們從13-14歲就開始練習攀岩這個運動，她甚至比我更早開始，一直到現在我們都已經是25-26歲的成年人了，一個人堅持熱愛專注投入在一個非高報酬，甚至付出比收穫更多的的產業，只為了能有獲得成績努力被看見的一天。\n我國小是游泳隊的，每一次比賽不論大小都是我累積實力跟自我檢視的機會，能站上國際賽事的舞台我相信是每個運動員一生的夢想與堅持不懈的理由，如果所有的付出都沒有被看見的機會，我相信願意繼續待在這個產業為國家爭光的人只會越來越少，請給這些一輩子都全心投入在運動事業的人一次機會，不論成敗勇於拼搏奮鬥到底的他們，所有的付出都值得尊重且有發光發亮的機會，謝謝。","time":"2026-07-11"},{"text":"支持","time":"2026-07-11"},{"text":"靠民間力量取得參賽資格之選手不應成為政策下的犧牲品，此狀況的發生實證明此法規具有相當大的模糊且不合理之區域。\n應當由執政方領軍修正，以提供我國國民為國爭取榮譽之權利，放寬由國家授予參賽權、民間贊助輔助之比例界線。","time":"2026-07-11"},{"text":"山巔不只屬於奪牌的人，也屬於每一位憑實力抵達起點的人。","time":"2026-07-11"},{"text":"運動員參賽的標準，不應以官員們「覺得」是否可取得前三名來當作參賽資格","time":"2026-07-11"},{"text":"比賽這種東西，可以比就去比挖！","time":"2026-07-11"},{"text":"希望台灣的運動員都能有自己發揮的空間","time":"2026-07-11"},{"text":"請支持運動員的努力","time":"2026-07-12"},{"text":"我認為，只要符合該賽事的參賽資格，就應該依照國內排名，依序由有意願參賽的選手代表出賽。\n體育精神，不應該只有「有機會奪牌的人」才有資格站上賽場。\n如果有實力更強的選手願意參賽，當然應該優先由他們代表；但如果只是因為認為「沒有奪牌機會」，就選擇不派任何選手參賽，這樣的做法真的符合體育精神嗎？\n競技運動的價值，不只是獎牌而已。讓選手站上國際舞台、累積經驗、挑戰自我、和世界各地的選手競爭，本身就是體育精神的一部分。奪牌固然重要，但不應該成為決定選手是否有機會參賽的唯一標準。","time":"2026-07-14"}]},"新北市深坑區":{"county":"新北市","town":"深坑區","count":4,"comments":[]},"臺中市東勢區":{"county":"臺中市","town":"東勢區","count":7,"comments":[{"text":"台灣已經有非常多優秀的選手在拼盡自己的生涯往世界走了，若沒有獲得政府的支持，反而被潑冷水不就太令人惋惜了嗎？拜託支持這些擁有夢想且也為此拼搏的人們！","time":"2026-07-11"},{"text":"你不給年輕人出去增加大賽經驗 等同把鳥兒永遠關在鳥籠 侷限他們的自由 請給他們一個證明自己的機會 證明那些流過得汗 受過的傷 證明那每一次跌倒在努力站起來的勇氣 證明他們這些努力是值得 是勇敢在全世界證明自己的機會 這世界很大 但很多默默在努力的運動員 請不要埋沒他們 給他們一次機會吧！","time":"2026-07-11"}]},"臺中市南區":{"county":"臺中市","town":"南區","count":40,"comments":[{"text":"希望選手都能保障已取得參賽資格選手之參賽權益，加油！","time":"2026-07-10"},{"text":"我覺得應該要讓更多想要站上國際舞台累積實力的選手一個發光發熱的機會。","time":"2026-07-11"},{"text":"明明選手已經取得大賽的參賽資格，為什麼一張白紙黑字，和根本不了解他們的人，就可以否定他們的努力，覺得他們不會得名？？？","time":"2026-07-11"},{"text":"已經獲得國際認證的運動員就應該要有資格出國比賽，這是他們的權益，不能因為一句沒機會奪牌就不送出國，講難聽一點就是不想浪費錢所以不出錢，如果早這個道理來說是不是臺灣男籃也不必出去比世界盃資格賽？","time":"2026-07-11"},{"text":"體育發展並非一蹴可幾，國家應多支持運動選手參加比賽累積經驗。","time":"2026-07-11"},{"text":"運動部成立後，社會期待的不只是延續過去體育署的競技管理，而是推動全民運動、運動平權、基層培育、運動產業、國際參與與多元發展。","time":"2026-07-11"},{"text":"支持","time":"2026-07-11"},{"text":"支持，必須讓世界看到台灣，保存台灣選手的熱情與生命力。\n\n會不會奪牌，不是政府說的算的，這對台灣人非常不公平。\n\n讓選手比賽，讓台灣發光！讓選手發光！","time":"2026-07-11"},{"text":"運動賽事是最和平能讓世界看到我們的方法之一，同時經驗累積與視野遼闊的機會。希望台灣運動員們都有努力站上舞台的機會。","time":"2026-07-11"},{"text":"請讓運動員，尤其是新興運動缺乏國際競賽機會的選手，能有更多機會站上國際舞台，不是認為沒有奪牌的希望就抹煞他們的機會。而是應該要開創更多的機會來培養更多的人才。","time":"2026-07-11"},{"text":"有參加比賽才能累積經驗值，而且國際賽事本來取得資格就不容易，有參加資格，最應該的就是讓選手去比賽","time":"2026-07-11"},{"text":"台灣對運動的發展、賽事的意義、運動員的同理⋯目前還處於相當落後的思維，期望未來能對運動更重視以及有峎好的制度面協助發展","time":"2026-07-14"}]},"屏東縣萬巒鄉":{"county":"屏東縣","town":"萬巒鄉","count":2,"comments":[{"text":"希望能給予台灣運動員更多的機會去追夢，看看世界也好，沒有切磋怎麼進步呢？","time":"2026-07-10"}]},"花蓮縣吉安鄉":{"county":"花蓮縣","town":"吉安鄉","count":15,"comments":[{"text":"運動家精神","time":"2026-07-09"},{"text":"選出國家最優秀的選手出國比賽很正常，既然都選出來卻不讓選手去比賽，那選國手的意義是什麼","time":"2026-07-11"},{"text":"因該讓有資格選手出門比賽，而非胎死腹中，完全不合理的直接取消參賽資格根本扼殺人權，臺灣不應該是民主國家嗎？為什麼還會像私人主義一樣的抹殺人權。","time":"2026-07-11"},{"text":"判斷能不能比賽的標準應該要更公開的透明一點\n例如：該項目取得過國內/國外比賽一些獎項等等…。","time":"2026-07-11"},{"text":"競技運動可以實踐的原則，就是公平。\n如果連原則擬定都有厚此薄彼了，那遑論公平呢？","time":"2026-07-13"}]},"高雄市鼓山區":{"county":"高雄市","town":"鼓山區","count":37,"comments":[{"text":"我覺得每個運動員都很努力想要獲取國際賽資格，好不容易爭取到的機會，就這樣被毀掉，就沒有人想繼續爭光","time":"2026-07-11"},{"text":"支持！","time":"2026-07-11"},{"text":"支持","time":"2026-07-11"},{"text":"請珍惜每位選手的努力","time":"2026-07-11"},{"text":"支持讓選手有機會可以出國為國爭光","time":"2026-07-11"},{"text":"國家不能否定選手的資格 這是非常需要修改的原則性問題","time":"2026-07-11"},{"text":"我認為，如果沒有持續灌溉，一項運動很難真正扎根、發芽。\n\n以奪牌為目標當然沒有錯，但並不是每一位走上國際舞台的人，都一定會成為站上頒獎台的那一位。即便如此，他們依然有重要的價值——因為他們讓世界看見這項運動，也讓更多人知道，原來有這樣的一條路可以走。\n\n或許他們沒有帶回獎牌，卻替後來的人鋪了一條路，讓更多人願意投入，也讓更多國家認識我們。這些努力，都是一個國家被世界記住的重要一筆。","time":"2026-07-11"},{"text":"有任何的機會都應該幫選手極力爭取！","time":"2026-07-11"},{"text":"支持合理修法","time":"2026-07-12"},{"text":"每一位運動員都因該要有比賽的機會不管是為了國家還是個人","time":"2026-07-23"},{"text":"教練與選手如此努力，政府忽視這一切，大家要支持這群為自己及國家爭取榮耀的孩子們，加油！","time":"2026-07-23"},{"text":"我支持修正此原則。選手取得國際賽參賽資格，是多年努力與公平競爭的成果，不應因行政因素喪失參賽機會。保障已取得資格選手的參賽權益，不僅維護公平正義，也能提升體育制度的公信力，讓選手安心備戰，為國爭光。","time":"2026-07-20"}]},"新北市金山區":{"county":"新北市","town":"金山區","count":3,"comments":[{"text":"政府不應以利益優先考量 而忽略新興運動的發展","time":"2026-07-11"}]},"臺中市太平區":{"county":"臺中市","town":"太平區","count":32,"comments":[{"text":"健力","time":"2026-07-09"},{"text":"選手的參賽權益應該被保障！","time":"2026-07-10"},{"text":"台灣對於國手不友善 卻常常想爭取國際知名度","time":"2026-07-11"},{"text":"支持","time":"2026-07-11"},{"text":"我覺得無論能不能贏，都不能阻止選手去比賽","time":"2026-07-11"},{"text":"支持","time":"2026-07-11"},{"text":"新興運動需要國際大賽的經驗累積，才能帶動國內基層的參與和發展，落實運動平權與多元參與，別讓多元運動流於口號。","time":"2026-07-11"},{"text":"我認為國家的運動員們需要更多的機會，而非僅具奪牌實力才能參賽，無國際參賽經驗，何談「奪牌」","time":"2026-07-11"},{"text":"支持運動員努力要能夠出賽，才有機會為自己的運動生涯奮鬥","time":"2026-07-11"},{"text":"希望可以幫助 "我支持覆議。\n\n運動員花了數年甚至十幾年的努力，通過層層選拔取得亞運參賽資格，卻因「得牌機會不高」而失去代表國家出賽的機會，這並不符合公平原則。\n\n如果國家要設定參賽標準，應該在選拔開始前就公開且明確，而不是等選手取得資格後才改變結果。制度可以有門檻，但規則必須透明、一致，才能讓所有運動員安心投入訓練。\n\n成績固然重要，但國際賽經驗也是培養未來競爭力的重要一環。希望未來的制度能兼顧競技表現與運動員權益，讓每一位努力爭取資格的選手都能獲得公平對待。","time":"2026-07-11"},{"text":"台灣衝浪國手已經參加所以比賽得到了參加亞運的積分資格 政府卻在最後一刻說沒有達標能力不足 是政府不想補助輔助這些選手為台灣站上國際舞台上發揚光大嗎","time":"2026-07-12"},{"text":"支持修正不服時宜的陳腐條文。","time":"2026-07-13"},{"text":"很關注這個議題，自己是衝浪愛好者看到新生代的選手有冒出頭的氣勢卻無法參賽真的很嘔，我贊成國家有選材的標準但若已獲參賽資格卻不合選訓標準的選手，能否討論開啟自費方案保障選手自行決定參賽的權利呢，謝謝","time":"2026-07-23"}]},"南投縣埔里鎮":{"county":"南投縣","town":"埔里鎮","count":11,"comments":[{"text":"請支持有能力的選手","time":"2026-07-09"},{"text":"原政策眼光太狹隘了，我們應該要支持所有認真投入的運動員參與世界比賽累積經驗繼續成長，這樣臺灣才有機會奪牌不是嗎？","time":"2026-07-11"}]},"桃園市楊梅區":{"county":"桃園市","town":"楊梅區","count":39,"comments":[{"text":"支持！！！","time":"2026-07-10"},{"text":"不該剝奪選手參賽權利","time":"2026-07-11"},{"text":"修正運動部《我國參加國際大型運動賽會組團參賽原則》，保障已取得參賽資格選手之參賽權益","time":"2026-07-11"},{"text":"本身身為綜合格鬥運動員，我的教練張○已經確定進軍亞運。我期望整個台灣的體育環境連同這項運動都能發展的越來越好。","time":"2026-07-11"},{"text":"選手是否能在正式比賽中取得名次，受到臨場發揮、對手狀況、戰術安排及傷病等多項因素影響，難以事前準確預測。若由主管機關以「是否具有奪牌能力」作為參賽資格的判斷依據，不僅可能受到主觀評估影響，也可能使具潛力的選手失去累積國際賽經驗的機會。許多優秀選手都是透過一次次參賽累積經驗後才逐漸突破，若過早限制參賽資格，反而不利於國家培育未來人才。因此，建議以公開透明、客觀且可檢驗的選拔制度取代對未來成績的主觀預測，在追求競技成績的同時，也兼顧選手的發展機會與制度公平性。","time":"2026-07-11"},{"text":"希望所有有夢想、有實力的選手可以站上世界的舞台","time":"2026-07-11"},{"text":"選手已獲得參賽資格，不應因為一句“不具備奪牌實力”而取消選手參賽的權利，我們也不會因為不具備考上臺大的實力而不參加學測或是不具備年收百萬能力而不去工作，若因此不讓選手參賽，以後怎麼培養更多運動選手？選手在賽場上累積實力和經驗才能成長，變得具備奪牌實力，國家應該支持選手，而不是阻擋選手，讓選手站在國際舞臺上，應該是一件十分光榮的事，即使沒有奪牌，也能增加國際曝光度，因此應該支持選手參賽","time":"2026-07-11"},{"text":"出國比賽的價值不單單是奪牌\n國際賽事可以讓我國選手跟其他國家的選手交流 進而拓展視野 把經驗帶回團隊 分享給其他人\n這不也是在促進台灣運動環境嗎","time":"2026-07-11"},{"text":"請讓任何努力在自己的運動上發光發熱的選手們有機會站上國際舞台","time":"2026-07-11"},{"text":"沒有平時的栽培與基層的努力哪來奪牌的希望？沒有國際賽的磨練和資源的挹注選手教練的經驗也難以累積，應該思考的是將高額的獎勵金制度改為讓更多優秀運動員有機會在國際舞台上磨練與爭光！","time":"2026-07-14"}]},"新北市樹林區":{"county":"新北市","town":"樹林區","count":43,"comments":[{"text":"努力多年不就是為了這時候\n還不給參加","time":"2026-07-10"},{"text":"希望不要抹殺運動選手他們前進世界 未全額補助。」，第二項可以加「若選手自費參加奪牌，必須補助自費金額的八成比例或全額。若無補助不可將選手奪牌成就歸功於己。」","time":"2026-07-11"},{"text":"希望努力很久的選手能夠順利進行國家隊出賽！！","time":"2026-07-12"},{"text":"保障所有符合參賽項目資格選手權益","time":"2026-07-12"},{"text":"支持","time":"2026-07-16"},{"text":"好","time":"2026-07-23"},{"text":"修正為取得參賽資格及名額就派員參賽，記得台北舉辦世大運時，有很多項目沒派人參賽，就因為沒能達標，在自己國家比，不是應該派好派滿選手去跟各國交流，就因為政策訂了一個達不到的標準。所以當然要修訂","time":"2026-07-23"}]},"臺中市北區":{"county":"臺中市","town":"北區","count":30,"comments":[{"text":"讓國手累積國際賽經驗是進步路程中不可或缺的一部分","time":"2026-07-10"},{"text":"我覺得讓選手累積經驗很重要","time":"2026-07-11"},{"text":"台灣運動員的處境在李洋部長上任後正在一點一點變好，然而卻發生攀岩選手無法代表出國參賽的問題，讓更多新興運動例如匹克球、攀岩等等無法有站上國際舞台的空間，希望能夠修改規定，讓運動成為生活、成為人民的一部份，而並非將運動塑造為只為了奪牌所從事的工作","time":"2026-07-11"},{"text":"支持運動選手，台灣全面運動國際化","time":"2026-07-11"},{"text":"每個人都有站上賽場的權利更何況是國際的門票已經入手，不去不合理","time":"2026-07-11"},{"text":"本提案方向具合理性，但仍有幾項可能的漏洞與附帶效應值得補強。首先，「取得參賽資格即原則派遣」可能遭質疑增加國家經費負擔、排擠其他項目資源，因此建議保留有限例外，例如重大傷病、禁藥、違反紀律或其他重大客觀事由，並要求書面說明理由。其次，「取得資格」應明確定義為經國際總會、亞洲總會或主辦單位正式核定之參賽資格或配額，避免外卡、保障名額等認定爭議。另申復與外部審查程序應配合國際賽報名期限，避免救濟完成時已錯過報名。公開決策資訊時，也應兼顧選手個資、醫療資訊及依法不得公開事項。此外，建議將「全民運動」調整為「長期競技發展、運動治理與人才培育」，更符合奧亞運代表隊制度定位。最後，可補充說明，國際大型賽會除爭取獎牌外，也具有累積國際經驗、培育人才及帶動運動發展等公共利益，避免外界誤解為只要取得資格就必須無條件派遣，提高提案的完整性與可行性。","time":"2026-07-11"},{"text":"本人支持修正運動部《我國參加國際大型運動賽會組團參賽原則》，保障已取得參賽資格選手的參賽權益。選手投入多年時間、心力與資源，歷經公平公開的資格賽取得參賽資格，應受到制度保障，不應因非競技因素而喪失代表國家出賽的機會。修正相關規範，建立明確、公平且透明的審查與保障機制，不僅能維護選手的努力成果與基本權益，也有助於提升我國體育制度的公信力，讓選手能安心備戰、全力爭取佳績，進一步提升我國國際競爭力，因此支持本提案。","time":"2026-07-11"},{"text":"身為一個運動員，我從事非盛行於台灣的運動項目，在資源上政府給的幫助並不多，即使是參與國際賽事（包含世錦賽、亞錦賽代表中華台北）90%的運動花費都出自於選手本人自行吸收，其中在內有：機票、住宿、伙食、報名費，我們不僅沒有任何贊助，還需要自行負擔代表國家參賽的任何費用。\n而今年的協會將在年底更換秘書長，因無人願意出來擔任，導致協會的存在與否成為了未知數，這表示我們即將面臨：無法參與國際賽事、無法參與台灣的主要賽事（如 全民運），這將導致選手們的參賽權益被迫損害。\n與此同時這項提案的出現，讓我想起新興運動的辛苦，與取得資源該付出的努力，卻因為一句不夠奪牌實力，就無法參與賽事，這將成為阻礙運動發展的原因之一！","time":"2026-07-11"},{"text":"比賽本身也是一種練習，不能因為覺得不會得名就限制這個機會","time":"2026-07-11"},{"text":"請支持選手們為台灣爭光的機會","time":"2026-07-11"},{"text":"應該讓達到國際標準的台灣前幾名選手有機會出去比賽，這樣才能讓台灣體育發展更進一步，也讓選手更能欲強則強，甚至明白自己的差距，在回台繼續努力訓練！\n不是說有達標就都可以，但至少讓已經在台灣前幾名的選手有更進步的空間！","time":"2026-07-23"}]},"新北市五股區":{"county":"新北市","town":"五股區","count":19,"comments":[{"text":"支持選手出國參賽！一個運動項目、一位選手需要長期培養，不能只是因為奪牌機會渺茫、考量效益，就自斷後路。\n如何教育下一代擁有運動家精神呢？","time":"2026-07-10"},{"text":"支持每位選手有資格參加比賽","time":"2026-07-11"},{"text":"支持選手參與比賽","time":"2026-07-11"},{"text":"需要參加國際賽事的經驗才能積累實力！運動活動本身就是志在參加，這樣有失本意。","time":"2026-07-11"},{"text":"沒試過怎麼知道會怎樣，不能直接扼殺運動員的舞台啊","time":"2026-07-11"},{"text":"附議。\n\n選手為了取得國際大型賽會的參賽資格，往往投入多年訓練與大量心力，資格取得本身就是實力的證明。若因行政程序、組團原則或其他非競技因素而失去參賽機會，對選手並不公平，也可能影響其職涯發展與國家整體競技表現。\n\n建議修正《我國參加國際大型運動賽會組團參賽原則》，以保障已依法取得參賽資格選手的參賽權益，讓選拔制度更加透明、公平且具有一致性，使選手能安心備戰，也能維護我國體育制度的公信力。","time":"2026-07-11"},{"text":"請支持任何一個能為國家付出一切的運動員","time":"2026-07-11"},{"text":"提議核心\n修正《我國參加國際大型運動賽會組團參賽原則》，將「得牌奪金」單一導向，轉型為兼顧選手權益與運動多元發展的現代化制度。\n四大修正方向\n1. 保障參賽權：取得國際資格者原則上應參賽；若不派員，須具客觀理由並建立申復與審查機制。\n2. 翻轉單一導向：目標改為兼顧競技成績、選手權益、國際參與及長期培育。\n3. 提升透明度：公開選訓與不派員標準；限制參賽時，須公開會議紀錄、依據與救濟管道。\n4. 共同檢討修訂：邀集選手、教練、學者及基層代表共同修訂，落實運動平權。\n預期效益\n 保障權益與信任：避免行政裁量排除合格選手，透過程序正義減少黑箱疑慮。\n 扶植新興項目：提供滑板、霹靂舞等新興運動舞台，累積國際經驗並吸引基層投入。\n 落實施政方針：使代表隊選拔符合運動部「全民運動、多元發展」方針，避免流於口號。\n 兼顧國家長期利益：從追求短期獎牌轉為培養長期人才，健全現代運動治理。","time":"2026-07-11"}]},"臺中市大雅區":{"county":"臺中市","town":"大雅區","count":23,"comments":[{"text":"希望選手能夠順利進行國家隊出賽","time":"2026-07-10"},{"text":"培養新興運動增加未來下一代多元發展應該是從零開始，而不是一開始就要求有及格分數或是更高，要看到樹苗成長為一顆大樹也是需要許多的照顧和呵護，更何況很多新興運動的參賽選手獲取能夠走入國際的機會我認為就是擁有奪冠的資格，如果判斷是否有資格只因少數人判定，我認為缺乏公平和可信的價值，許多事情和觀念如果能從政府開始推廣就能快速進入社會，如果能給予勇於挑戰自己並且走出不一樣的人的機會，那我認為誰都沒有權力剝奪","time":"2026-07-11"},{"text":"通過了甄選就應該讓選手去比賽，不讓選手去比賽甄選的意義何在","time":"2026-07-11"},{"text":"保障運動選手參與國際賽事的資格，應比能否奪牌、勝算等因素更加重要。","time":"2026-07-11"},{"text":"支持，請尊重新興運動選手們的努力","time":"2026-07-11"},{"text":"​案由：修正《我國參加國際大型運動賽會組團參賽原則》以保障選手權益。\n​\n  現行原則過度強調「奪牌」目標，賦予主管機關過大之行政裁量權，導致選手雖取得國際參賽資格，卻仍遭排除。\n\n為落實運動平權與現代治理，提議如下：\n​一、廢止第七、八項條文： 刪除賦予行政機關「個案核定」與「限制指導」之空白授權條款，避免黑箱決策凌駕國際選拔機制。\n​二、明定參賽保障： 增訂「凡依國際規則取得參賽資格者，原則上應予報名」。若擬限制派員，須提出客觀標準、執行書面說明及外部審查救濟機制。\n​三、翻轉評估指標： 將單一「奪牌導向」修正為「兼顧競技成績、選手參賽權益、國際經驗與長期培育」。\n​四、落實透明治理： 強制公開選訓會議紀錄與決策標準，使組團制度回歸運動專業與程序正義。\n\n  ​此修法非否定成績重要性，而是要求國家建立公平、透明且具長期視野的治理制度，保障選手奮鬥成果，讓制度符合「還運於民」之精神。","time":"2026-07-11"}]},"雲林縣林內鄉":{"county":"雲林縣","town":"林內鄉","count":5,"comments":[{"text":"能代表國家出去比賽的選手都有一定的實力不應該讓選手自己付費甚至連公假都不能請還要請事假，我覺得應該讓所有國手都要有公假，而不是要跟公司協調以及出國前應該要實施集訓並且給予集訓內該有的薪資，運動員每天辛苦的訓練不應該代表國家出國比賽的時候還要煩惱工作請假的問題而是要給予足夠的資源讓運動員專心在場上為國爭光。","time":"2026-07-20"}]},"雲林縣虎尾鎮":{"county":"雲林縣","town":"虎尾鎮","count":36,"comments":[{"text":"新興奧運項目需要栽培，更何況台灣是一個四面環海的國家，除了海洋教育不足之外，連選手爭取更多機會讓世界看到台灣，並讓國人看見這個運動的機會都要剝奪嗎？當越多人參與，海邊憾事就會降低，何樂不為","time":"2026-07-10"},{"text":"我覺得不管輸贏選手都已經很努力了，努力那麼久卻沒有舞台讓大家看到這項運動 自己幾年來的努力成果，即便成果如何這也是讓世界看到台灣的方法台灣雖然很小但實力卻不輸給任何一位比我們強勢的選手，我認為結果不論如何都應當給選手更好的機會發展，加油💪","time":"2026-07-10"},{"text":"希望選手能夠順利進行國家隊出賽","time":"2026-07-10"},{"text":"請保障選手之參賽權益，感謝！","time":"2026-07-11"},{"text":"我認為選手努力取得國際賽資格不應該被認為不具備奪牌實力的理由奪走比賽機會。","time":"2026-07-11"},{"text":"身為運動員當日是附議，拜託一下不要整日只想著怎麼貪污  好好協助選手、公平對待選手、提升選手福利才是你他媽運動部存在唯一有用的目的","time":"2026-07-11"},{"text":"知道最主要是預算有限去造成這樣制度\n但希望政府與更多企業去多撥預算與資源培養體育、藝術等等人才。\n\n想要有更好的成績與榮譽\n背後的資金與心力投入是必要的。","time":"2026-07-11"},{"text":"💪🏻","time":"2026-07-11"},{"text":"應讓國家代表選手有出國參賽的經驗","time":"2026-07-11"},{"text":"運動員需要的是尊重和支持 為了自己和國家奮鬥我們的努力只想讓大家有目共睹","time":"2026-07-20"},{"text":"修正運動部《我國參加國際大型運動賽會組團參賽原則》，保障已取得參賽資格選手之參賽權益","time":"2026-07-20"},{"text":"希望能有更多的運動項目有機會能參加大型綜合運動競賽，有些項目非熱門運動，但仍有許多選手為自己熱愛的運動在努力。","time":"2026-07-20"},{"text":"很好","time":"2026-07-20"},{"text":"這樣子的政策我認為更能保障運動員的權利","time":"2026-07-20"},{"text":"加油~","time":"2026-07-23"}]},"屏東縣東港鎮":{"county":"屏東縣","town":"東港鎮","count":9,"comments":[{"text":"支持","time":"2026-07-10"},{"text":"附議","time":"2026-07-11"}]},"桃園市八德區":{"county":"桃園市","town":"八德區","count":35,"comments":[{"text":"從前曾經是一位拔河選手，充分瞭解國際賽事經驗對於國內有多重要，希望選手有機會出賽就去挑戰，期待攀岩運動能夠變得更好！也請希望運動部能尊重國際總會的標準，也不應該阻止選手追夢。","time":"2026-07-11"},{"text":"永支","time":"2026-07-11"},{"text":"支持合理修法 為選手爭取合理權益","time":"2026-07-11"},{"text":"支持讓運動員的政策更完善","time":"2026-07-11"},{"text":"沒有前人的經驗何來傳承，走向世界我們運動競技者才會越來發光發熱。","time":"2026-07-11"},{"text":"選手具資格就應該去試，若沒有國際比賽經驗， "time":"2026-07-11"}]},"新北市林口區":{"county":"新北市","town":"林口區","count":29,"comments":[{"text":"應讓國家選手獲得更多機會積累國際賽事經驗、拓展視野，才能發現不足以修正、獲得更多更好的成績。","time":"2026-07-11"},{"text":"取得資格卻被國家剝奪 應該要鼓勵選手多多參賽 而不是反過來限制選手出賽","time":"2026-07-11"},{"text":"支持 一切都有希望","time":"2026-07-11"},{"text":"台灣每位運動選手都為了比賽而努力，缺被台灣政府剝奪了權益，一點都不人道","time":"2026-07-11"},{"text":"希望能給那些選手站上賽場的機會！","time":"2026-07-11"},{"text":"比賽資格那麼難取得，也許一次比賽無法立刻取得最高榮譽，但如果都不累積經驗，又怎能換來佳績？","time":"2026-07-11"},{"text":"這不合理啊","time":"2026-07-11"},{"text":"沒有一定要奪牌吧","time":"2026-07-11"},{"text":"沒有出賽哪來的經驗","time":"2026-07-11"},{"text":"連開始的機會都沒有要怎麼成功","time":"2026-07-11"},{"text":"請讓這些努力的選手，有到國際比賽累積實戰經驗的權利，若無經驗是很難取得名次的。一如沒有小考直接去考一場大考試；沒有模擬考直接去考學測。怎麼想都不合理。","time":"2026-07-11"},{"text":"應讓有能力有機會者出去表現或是增加經驗","time":"2026-07-11"},{"text":"讓選手們去比賽！！他們想去我們也想看！！！","time":"2026-07-11"},{"text":"支持","time":"2026-07-11"},{"text":"(轉自小Po)\n本次亞運三位運動員取得亞運參賽資格後，積極備戰，但國家最後告訴他們不予參賽。也就是台灣在攀岩這個項目棄賽。\n運動部的說法是這些選手「過往成績沒有達到標準」。\n可以理解政策的白紙黑字。但有兩點疑問，第一個是時間序，第二個是標準。\n一般選手要參與國家賽事，必須要先能進國家隊。以美國為例，國家隊的名額有限，如果運動員前一年賽事表現優秀，今年不用再經過選拔過程，直接進隊。但若賽事不夠優秀，或沒有參與足夠賽事，則要先取得進入國家隊的資格，然後再在比賽奪得席位。\n這些運動員取得奧運或是洲際大型比賽資格後，沒聽過無法參賽的，除非運動員本身因傷或者是沒有足夠經費而棄賽。\n台灣選手在四月取得亞運參賽資格，在六月底才被通知，因為過往成績沒有達到標準，不予參賽。這個時間序很奇怪。\n第二個是體育部列出來的標準，是否合理？個人覺得相當嚴苛。標準是「最近一屆奧運前8名、上屆亞運或最近一屆世大運、世界、亞洲、世青正式錦標賽前4名） 」用這樣的標準，那蠻多參加奧運的他國攀岩選手也不能參賽。\n很希望台灣的制度能更合理、完善。也期望能開放企業贊助、眾籌等選項，不一定非要公費參賽。讓選手有多一些可能。","time":"2026-07-12"},{"text":"選手加油","time":"2026-07-23"}]},"彰化縣伸港鄉":{"county":"彰化縣","town":"伸港鄉","count":5,"comments":[{"text":"做了不一定會成功，但不做永遠不會成功。加油！\n最重要是比賽的過程，從中學習經驗。一個永遠的成功者不會知道自己有哪裡需要改進；總要有一些失敗才能做得更好！","time":"2026-07-11"}]},"高雄市大社區":{"county":"高雄市","town":"大社區","count":7,"comments":[{"text":"希望選手能夠順利進行國家隊出賽！！！","time":"2026-07-10"}]},"基隆市暖暖區":{"county":"基隆市","town":"暖暖區","count":8,"comments":[{"text":"認真準備的人都值得原屬他們的舞台，希望國手們能順利出賽！","time":"2026-07-11"},{"text":"支持！！","time":"2026-07-11"},{"text":"支持","time":"2026-07-11"},{"text":"身為半個運動員，我認為非主流運動容易有這種情況。但出國比賽是為了累積經驗並看見外面世界厲害的人有多厲害，進而提升自己，因為覺得沒辦法奪牌就撤銷機會也是一種打擊","time":"2026-07-11"},{"text":"每位運動員都應該要有一個可以展現自我的舞台，不能因為別人一句話就否定掉前面所有的努力","time":"2026-07-11"}]},"桃園市新屋區":{"county":"桃園市","town":"新屋區","count":3,"comments":[{"text":"廢除不合理的規定","time":"2026-07-10"},{"text":"連比賽的資格都沒有機會\n哪來的經驗","time":"2026-07-11"}]},"屏東縣九如鄉":{"county":"屏東縣","town":"九如鄉","count":6,"comments":[{"text":"希望努力的選手可以得到他應有的參賽權益 累積參賽經驗 茁壯自我","time":"2026-07-11"},{"text":"既然都成為了運動員了，國家不應該是以支持之態度嗎？為何是尚未參賽就一口咬定選手無法奪冠？又沒有實際上過場，無憑無據的咬定無法奪冠真的讓人很不舒服，而且要具備奪冠的實力就是要走出舒適圈，多嘗試國際賽，而不是一直待在溫暖沒有威脅的鳥籠內，那樣是無法進步的，運動員要的就是不斷精進自己的競爭力，而不是被別人一口咬定無法奪冠，能否奪冠是實際去比之後才會知道，沒有人能夠提前知曉","time":"2026-07-11"}]},"嘉義縣太保市":{"county":"嘉義縣","town":"太保市","count":4,"comments":[{"text":"「海島之子，別再自我設限！多元發展、支持海洋運動，台灣人要團結！」\n\n我強烈附議此提案。\n\n台灣明明是一個四面環海的島國，我們每個人都是海島的小孩，血液裡理應流淌著海洋的基因。然而令人痛心的是，長期以來我們的社會與體育政策卻極度輕視海洋運動、水上運動的發展。\n\n打開電視、看新聞，永遠只有棒球、網球或少數特定主流項目獲得大量關注與資源。不是說這些運動不好，而是我們在「適性發展」上做得遠遠不夠！一個海島國家，卻集體對海洋感到陌生、甚至恐懼，這難道不可惜、不諷刺嗎？\n\n台灣在國際處境上已經面臨諸多不正常的打壓與困境，我們沒有資本再繼續內耗、自我設限、或搞單一化的發展。體育是讓世界看見台灣最強大的力量之一。我們必須打破僵化的思維，重視島嶼天賦，全力支持海洋運動與多元體育的發展。台灣人更要在這個關鍵時刻團結一致，讓我們的下一代能在藍天大洋中，展現真正屬於海島台灣的韌性與驕傲！","time":"2026-07-11"}]},"高雄市仁武區":{"county":"高雄市","town":"仁武區","count":11,"comments":[{"text":"運動員們加油~大家好棒！希望你們能如願站上國際的運動舞台","time":"2026-07-10"},{"text":"有沒有資格不是別人說的算，能拿到資格是選手實力，而不是一個連苦都沒吃過的別人輕飄飄的一句話剝奪否定他們所受的苦、所熬過的訓練拿到的入門票。\n還沒站上舞台就讓自己人放棄站上去比拼的機會，果然還是亞洲人只會看不起跟貶低自家人嗎，連被看見的機會都沒有，別人家的小孩實力如何，也是出來比拼才知道差距啊，你又覺得別人的小孩能力最強了嗎？\n這樣誰願意支持臺灣？處處受限，卻還是不少青出於藍而勝於藍的學子讓世界看見台灣，就你們大人不懂保護台灣孩子，等到台灣學子拿到成績回來才在那邊虛偽的恭喜，在這之前請勇敢給臺灣好的發展舞台，而不是棒打自家人、資源只敢收著。","time":"2026-07-11"},{"text":"沒比怎麼知道不具備奪牌資格，你行你上啊","time":"2026-07-12"}]},"雲林縣古坑鄉":{"county":"雲林縣","town":"古坑鄉","count":8,"comments":[{"text":"之前長期訓練得到青少年越野跑國手資格但因只有我一個未滿3人而被取消\n難過了好久","time":"2026-07-11"},{"text":"給運動員機會","time":"2026-07-11"},{"text":"我臥推很強","time":"2026-07-20"},{"text":"別人叫我幫忙填的","time":"2026-07-20"},{"text":"我覺得每個參賽者想要參加關於自己愛的運動的比賽是很正常的，想要展示給大家看，所以盡全力的去練習，那當突然被告知說沒有參賽的權利時，那練習時的心血不都白費了，希望可以訓練出好選手不要讓真正愛運動的人心碎，也保持的性別平等公平公正。","time":"2026-07-20"},{"text":"太棒了","time":"2026-07-23"}]}," ts":[{"text":"政府應當給予選手機會","time":"2026-07-11"},{"text":"不該讓舊有的制度，阻礙讓新一代甚至未來的運動員選手未來發展的可能","time":"2026-07-11"},{"text":"臺灣不支持臺灣人 說得過去嗎","time":"2026-07-11"}]},"嘉義縣東石鄉":{"county":"嘉義縣","town":"東石鄉","count":3,"comments":[{"text":"不知道花多少努力才取得參賽資格\n卻因為一句「不具有奪牌實力」\n輕易的剝奪原屬於他該有的機會\n\n先不論是否有奪牌實力\n他就是有參賽資格不是嗎 \n這世界不是在提倡過程比結果重要\n怎麼這時候卻用結果剝奪過程\n甚至是未證實的結果\n\n就算真的覺得實力懸殊 \n也應該讓他們出去闖闖 \n讓他們知道差在哪裡 \n他們才會有進步跟調整空間","time":"2026-07-11"}]},"高雄市茄萣區":{"county":"高雄市","town":"茄萣區","count":3,"comments":[]},"新北市三峽區":{"county":"新北市","town":"三峽區","count":11,"comments":[{"text":"努力的人就應該有站上賽場的機會","time":"2026-07-10"},{"text":"請運動部跳脫只想要可以沾光的選手的短視思考，對於相對資淺的運動項目而言，沒有出國比過賽哪裡會有經驗、怎麼打開眼界？\n沒有親自去感受一次頂尖領域的差距進步就是緩慢，更不用說這樣的決定肯定會直接的影響到運動人口的成長，絕對限縮了在項目間猶豫該選擇哪個項目投入訓練的家長及選手。\n我個人正是從興趣玩到投入選手，再轉教練的人，尤其目前投入訓練的項目又相對冷門，這樣的決策真的除了我們教練以外也都聽到了相當多的家長、選手的反對意見，感到心灰意冷在考慮是否退出或轉項目，這真的有助於運動嗎？\n運動部在砍不合理預算確實在一定程度上的初衷是幫助各項目拔除毒瘤，但難免毒瘤換個方式毒害專項，只著眼於奪牌率及不合理預算等短期成效的策略對長期的運動發展而言我相信肯定是不利的，而這相信也跟運動部成立的目的衝突，沒有人口何來官方？\n相信要達成這兩件事還可以有更深入問題核心的解決方案，否則終究是治標不治本，問題換個方式呈現罷了！","time":"2026-07-11"},{"text":"保障選手參賽資格","time":"2026-07-11"},{"text":"希望每個選手都有嘗試的機會","time":"2026-07-11"}]},"臺南市歸仁區":{"county":"臺南市","town":"歸仁區","count":7,"comments":[{"text":"已經看到好幾次台灣有些運動選手因為資格問題而取消參賽機會，真的非常可惜，不遠遠只是沒參加比賽這件事而已","time":"2026-07-10"},{"text":"請給予支持！出國比賽！","time":"2026-07-11"},{"text":"讓選手們有更多的機會與世界接軌，不要抹殺每個人付出的努力。","time":"2026-07-11"}]},"臺中市大甲區":{"county":"臺中市","town":"大甲區","count":7,"comments":[{"text":"台灣需要被看見","time":"2026-07-10"},{"text":"希望選手能出賽！","time":"2026-07-11"},{"text":"國家運動員應有此權利參加任何賽事","time":"2026-07-11"},{"text":"望選手能夠順利進行國家隊出賽","time":"2026-07-11"}]},"臺中市潭子區":{"county":"臺中市","town":"潭子區","count":20,"comments":[{"text":"保障每位選手爭取來的參賽資格","time":"2026-07-11"},{"text":"我支持","time":"2026-07-11"},{"text":"太誇張了，有任何上到國際賽場展現運動精神的機會，說好讓世界看見台灣呢，就這樣輕易把機會放掉，絕對不行，覆議覆議","time":"2026-07-11"},{"text":"要有參賽經驗，才會有經驗累積，最後才會有奪冠機會","time":"2026-07-11"}]},"屏東縣崁頂鄉":{"county":"屏東縣","town":"崁頂鄉","count":1,"comments":[]},"高雄市大寮區":{"county":"高雄市","town":"大寮區","count":9,"comments":[{"text":"支持已取得參賽資格選手可以出國比賽","time":"2026-07-11"},{"text":"支持多元運動發展與專業運動平民參與化，實質促進更多一般大眾參與更多元的運動領域，除幫助社會互動性與追求健康外，更應該重視有參與國際級賽事需求者","time":"2026-07-11"}]},"嘉義縣溪口鄉":{"county":"嘉義縣","town":"溪口鄉","count":1,"comments":[{"text":"支持","time":"2026-07-10"}]},"新竹市香山區":{"county":"新竹市","town":"香山區","count":16,"comments":[{"text":"不該以獲得前三名這個標準來決定出賽選手","time":"2026-07-10"},{"text":"應該給選手一點表現機會累積經驗 這麼努力得到的參賽資格不應該被剝奪","time":"2026-07-11"},{"text":"如果以透過資格賽達標亞運卻因國家認為不具備奪牌實力而取消參賽派遣資格，可能造成國內選手也無法透過國際賽事增加經驗與實力","time":"2026-07-11"},{"text":"讓每個人都有機會在自己的領域發光發熱","time":"2026-07-11"},{"text":"支持修改過時參賽原則！","time":"2026-07-12"}]},"屏東縣枋寮鄉":{"county":"屏東縣","town":"枋寮鄉","count":2,"comments":[{"text":"希望大家的努力不被淹沒","time":"2026-07-10"},{"text":"20年了，看了5次奧運、5次亞運，\n爭議流程仍然都是「出事 ➔ 輿論引爆 ➔ 政策討論 ➔ 協會配合、選手更迭，但問題根源沒解決。」\n的惡性循環。\n務實解法，想了20年，\n仍回到「透明化、專業化。」\n1.選訓制度是否適用於「每一項運動」，\n2.協會與選手之間的溝通-傳達-理解，\n3.選手本人對於制度的遵守，\n和\n4.在問題無法挽回之前的「解決機制」與「足夠時效」，是否存在？ \n我相信「衝突」是革新的契機。","time":"2026-07-13"}]},"新竹縣關西鎮":{"county":"新竹縣","town":"關西鎮","count":4,"comments":[{"text":"不敢想像在一個民主社會會發生這種事 選手的努力都白費了 希望可以通過 讓所有付出努力的運動員都有機會站上國際舞台 發光發熱","time":"2026-07-10"},{"text":"運動員參加運動賽事不是只為了得獎牌，更重要的是帶動國民的運動風氣！","time":"2026-07-11"},{"text":"規章無限放大了對運動員的限制，行政獨斷運動員的價值與可能性，以奪牌可能性選擇不派代表參賽的理由拆穿之後，還有什麼理由？會開始付諸立法院多數不審預算，沒有錢用，之後政府一點責任都沒有，這樣對嗎？利用詬病已久的舊時代運動規章，無法保障、保護、培育運動員的規章限制其作為代表出賽，問就是：沒錢要我怎麼辦，執政者該如何才能做到沒有錢能用？在條文中不應該有讓政府輕鬆下台的規範，政府不應依不合理的條文進行政治操作，模糊以及待解釋的空間太大。在遊戲規則中政府確實可以叫運動員回家***，但是看不下去的人會在這裡反撲。","time":"2026-07-11"}]},"雲林縣大埤鄉":{"county":"雲林縣","town":"大埤鄉","count":6,"comments":[{"text":"沒錯沒錯 該給運動員更多機會跟空間 我硬舉要拉300","time":"2026-07-20"},{"text":"請讓運動員們發揮","time":"2026-07-20"}]},"宜蘭縣壯圍鄉":{"county":"宜蘭縣","town":"壯圍鄉","count":5,"comments":[{"text":"我認為運動員應該有參賽的權利！若沒有經費，至少能允許自己自費參賽。","time":"2026-07-11"}]},"基隆市仁愛區":{"county":"基隆市","town":"仁愛區","count":7,"comments":[]},"臺中市烏日區":{"county":"臺中市","town":"烏日區","count":18,"comments":[{"text":"選手的權益應被保障🔥","time":"2026-07-11"},{"text":"不出去看看世界，不知道自身實力，又怎麼能夠精進自身能力，又怎能為國家爭一口氣，我支持","time":"2026-07-11"},{"text":"確實需要做些改變\n奪牌論，推動運動發展能兼顧平衡\n擁有國際賽資格 更應派出中華台北，中華隊最佳選手 無論是否有奪牌，無論推動運動及台灣選手走出去等等其它面相的意義長期累積，對國家台灣都是正面深遠。\n一些比較小眾的運動目前也是不能忽視，這才是好的運動環境\n各項選拔機制公平性\n調派選手上場機制是否公正\n一直都在發生中，大多的運動員與教練都不太敢發聲，更多的是很多優秀的運動員，為此離開運動競技\n選訓委員目前大多協會指派，現役運動員不敢表態，不配合就等於沒機會代表出賽 。 \n感謝發起議題的作者。","time":"2026-07-11"},{"text":"如果經費不夠可以開放自費參賽 而不是取得資格去不了 這樣超嘔的","time":"2026-07-12"},{"text":"以我自己的觀點來看，以往為了奪牌才派選手出去比賽的情況下，目的可能是為了增加台灣在國際上的曝光率，但是現階段台灣可能不需要透過這個方式來讓國際看見台灣。\n那是否要重新來評估國家隊的部分，不管是補助、國家培訓經費等等，避免因為爭奪經費等原因來影響出賽選手的權益?\n也可以避免民眾輿論如：國家養選手都沒有成績、選手自費訓練出國拿成績才去蹭選手的光環...等等。\n\n開放的更多、管得越少，讓民眾、選手、教練去自己為自己的選擇負起責任。","time":"2026-07-13"}]},"彰化縣社頭鄉":{"county":"彰化縣","town":"社頭鄉","count":5,"comments":[{"text":"為更多國手爭取出國比賽的機會，而不是用能不能奪牌來作為出國比賽的依據。","time":"2026-07-10"},{"text":"實力來自於經驗，如果因為沒有實力就不給出國參賽經驗，那我們台灣的運動就不會多有實力，感謝","time":"2026-07-11"},{"text":"理性討論選手參賽權益與國家資源合理分配。","time":"2026-07-14"}]},"屏東縣林邊鄉":{"county":"屏東縣","town":"林邊鄉","count":3,"comments":[{"text":"希望選手都能保障已取得參賽資格選手之參賽權益，加油！","time":"2026-07-10"},{"text":"請支持運動，運動人真的很辛苦。","time":"2026-07-14"}]},"屏東縣琉球鄉":{"county":"屏東縣","town":"琉球鄉","count":7,"comments":[{"text":"請讓台灣的選手能行使他們參賽的權利，他們明明有實力可以為台灣爭光，憑什麼不讓他們出賽？","time":"2026-07-11"},{"text":"支持！","time":"2026-07-11"},{"text":"支持運動員參賽資格","time":"2026-07-20"},{"text":"修法保障運動員權益","time":"2026-07-20"}]},"宜蘭縣五結鄉":{"county":"宜蘭縣","town":"五結鄉","count":6,"comments":[{"text":"請給任何在各個領域努力的人一次機會","time":"2026-07-10"},{"text":"取得參賽資格本應有參賽權，請支持台灣選手走向世界賽場","time":"2026-07-11"}]},"彰化縣鹿港鎮":{"county":"彰化縣","town":"鹿港鎮","count":9,"comments":[{"text":"讚","time":"2026-07-10"},{"text":"讓台灣選手站上國際賽場！","time":"2026-07-11"},{"text":"支持運動員參賽","time":"2026-07-11"},{"text":"我認為如果沒有給選手機會，那台灣就永遠不可能有奪牌的機會，並且選手為了代表國家出賽付出了很多努力只想有這個機會，卻因沒有奪牌實力而慘遭拒絕，那這個夢想就是不可能實現的，為什麼不給機會呢？","time":"2026-07-11"}]},"宜蘭縣羅東鎮":{"county":"宜蘭縣","town":"羅東鎮","count":10,"comments":[]},"臺中市清水區":{"county":"臺中市","town":"清水區","count":4,"comments":[{"text":"支持","time":"2026-07-10"}]},"臺南市下營區":{"county":"臺南市","town":"下營區","count":1,"comments":[]},"臺東縣卑南鄉":{"county":"臺東縣","town":"卑南鄉","count":3,"comments":[{"text":"不應該這樣限制選手","time":"2026-07-10"},{"text":"如果只需要能奪牌的選手出戰，那乾脆每一項比賽只規定最多三名選手比賽就好，大家都能奪牌","time":"2026-07-11"}]},"臺南市新營區":{"county":"臺南市","town":"新營區","count":12,"comments":[{"text":"努力要被看見，試過才能有結果","time":"2026-07-11"},{"text":"加油","time":"2026-07-11"}]},"臺中市梧棲區":{"county":"臺中市","town":"梧棲區","count":9,"comments":[{"text":"如果連台灣自己的選手參與賽事的權益都剝奪的話，台灣在國際賽事上是不會進步的","time":"2026-07-11"},{"text":"希望選手能夠好好的站在世界的舞臺，不要因為外界的障礙而放棄人生中的大好機會","time":"2026-07-11"},{"text":"我覺得不是只有一定會得名的才可以去比賽，運動原就是要多去比賽多看看別人怎麼練習用什麼方式比賽，才能得到好成績","time":"2026-07-11"},{"text":"應保障選手出賽資格","time":"2026-07-11"},{"text":"「尊重國際賽制，回歸體育運動本質」。奧運、亞運等國際賽事的參賽資格，是由國際總會透過嚴謹的資格賽、世界排名與積分制所決定。選手能突破重圍取得席次，本身就是最高榮譽的展現。國內選訓不應再疊床架屋，用過時的「奪牌導向」或自訂門檻去否定國際組織的認證，應將參賽權完整還給靠實力拼出門票的選手。","time":"2026-07-11"},{"text":"都已經取得比賽的資格了，憑什麼說不具得獎資格就不能參賽？！這是什麼爛規定！","time":"2026-07-11"}]},"高雄市岡山區":{"county":"高雄市","town":"岡山區","count":8,"comments":[{"text":"不應用能否奪牌來剝奪選手的參賽資格，每一次的比賽都是經驗的累積，若選手一直都因奪牌希望低無法出賽，怎麼能看見此項運動的未來","time":"2026-07-11"},{"text":"我支持修改這個題案，運動員達到參賽資格，卻以沒有機會得獎為由而不讓他們參加，非常不合理，是如何知道他們不可能會得獎的？","time":"2026-07-11"},{"text":"沒有比賽怎麼知道會不會獲獎呢？不該因為沒獲獎的可能就阻擋別人參賽","time":"2026-07-11"},{"text":"選手既然已經取得比賽門票，國家不應該因為覺得沒有奪牌可能，就不讓他們去比賽。就算真的沒有奪牌可能，比賽也是非常非常好提升實力的機會。","time":"2026-07-11"},{"text":"如果一個具民主的國家，有著一群頂尖選手，為了比賽每天都在練習，勤苦的練習，到最後連一場能夠展現自己成果、讓世界看到台灣的比賽都無法參加，我覺得非常不合理，藉此附議爭取大家的努力。","time":"2026-07-11"}]},"彰化縣和美鎮":{"county":"彰化縣","town":"和美鎮","count":17,"comments":[{"text":"希望臺灣能有機會被看見！","time":"2026-07-11"},{"text":"道理本該如此","time":"2026-07-11"},{"text":"不提供獎金資源還擋人出國比賽？","time":"2026-07-11"},{"text":"麻煩國家派遣攀岩選手到名古屋亞運比賽，他們明明有資格。","time":"2026-07-11"},{"text":"這些選手也都是付出了自己的努力 憑什麼國家說不行就不行去了","time":"2026-07-11"},{"text":"如果國家一方面宣示全民運動與運動多元發展，另一方面卻只承認最可能奪牌的項目與選手，會使政策訊息前後矛盾。修正組團原則，可以讓全民運動不只停留在基層參與，而是延伸到國家如何看待不同運動項目的發展權利與國際舞台機會。","time":"2026-07-11"},{"text":"選手為國爭光","time":"2026-07-11"},{"text":"每個人都是從經驗成長","time":"2026-07-11"}]},"屏東縣萬丹鄉":{"county":"屏東縣","town":"萬丹鄉","count":6,"comments":[{"text      <h2>全台鄉鎮市區附議排行</h2>
     <div class="meta">前 30 名｜點選排行或地圖查看匿名留言</div>
     <div class="toplist">${top.map(d=>`<div class="topitem" data-key="${esc(d.county+d.town)}"><span>${esc(d.county)} ${esc(d.town)}</span><b>${d.count} 人</b></div>`).join("")}</div>`;
   document.querySelectorAll(".topitem").forEach(el=>el.onclick=()=>{ const d=DATA.towns[el.dataset.key]; showTownPanel({...d,key:el.dataset.key}); });
 }else{
   const top=Object.entries(DATA.counties).sort((a,b)=>b[1].count-a[1].count);
   document.querySelector("#panel").innerHTML=`
     <h2>全台縣市附議排行</h2>
     <div class="meta">點選排行或地圖查看匿名留言</div>
     <div class="toplist">${top.map(([county,d])=>`<div class="topitem" data-county="${esc(county)}"><span>${esc(county)}</span><b>${d.count} 人</b></div>`).join("")}</div>`;
   document.querySelectorAll(".topitem").forEach(el=>el.onclick=()=>showCountyPanel(el.dataset.county));
 }
}
function setMode(mode){
 currentMode=mode;
 document.querySelector("#townModeBtn").classList.toggle("active",mode==="town");
 document.querySelector("#countyModeBtn").classList.toggle("active",mode==="county");
 document.querySelector("#covered").textContent=(mode==="town"?Object.keys(DATA.towns).length:Object.keys(DATA.counties).length).toLocaleString();
 document.querySelector("#coveredLabel").textContent=mode==="town"?"有附議鄉鎮":"有附議縣市";
 rebuildScale(); renderLegend();
 if(window.redrawMap) window.redrawMap();
 showOverview();
}
document.querySelector("#townModeBtn").onclick=()=>setMode("town");
document.querySelector("#countyModeBtn").onclick=()=>setMode("county");
showOverview();

async function loadFeatures(){
 const topo=await d3.json(ATLAS_URL);
 const object=topo.objects.towns || topo.objects[Object.keys(topo.objects).find(k=>k.toLowerCase().includes("town"))];
 if(!object) throw new Error("圖資中找不到鄉鎮市區圖層");
 return topojson.feature(topo,object).features.map(feature=>({feature}));
}

loadFeatures().then(rows=>{
 const geo={type:"FeatureCollection",features:rows.map(r=>r.feature)};
 const svg=d3.select("#map");
 const node=svg.node();
 const width=node.clientWidth||900, height=node.clientHeight||760;
 svg.attr("viewBox",`0 0 ${width} ${height}`);
 const projection=d3.geoMercator().fitExtent([[35,25],[width-35,height-25]],geo);
 const path=d3.geoPath(projection);
 const tip=document.querySelector("#tooltip");
 let matched=0;
 const paths=svg.append("g").selectAll("path").data(rows).join("path")
   .attr("class","town")
   .attr("d",d=>path(d.feature))
   .each(function(d){
      d.id=identifyTown(d.feature);
      this.dataset.key=d.id.key;
      this.dataset.county=d.id.county;
      if(d.id.key) matched++;
   });
 window.redrawMap=()=>{
   paths.attr("fill",d=>{
      const val=currentMode==="town" ? (DATA.towns[d.id.key]?.count||0) : (DATA.counties[d.id.county]?.count||0);
      return currentColor(val);
   }).attr("opacity",d=>d.id.town?1:.72);
 };
 window.redrawMap();
 paths
   .on("mousemove",(event,d)=>{
      const val=currentMode==="town" ? (DATA.towns[d.id.key]?.count||0) : (DATA.counties[d.id.county]?.count||0);
      tip.style.opacity=1;
      tip.style.left=(event.clientX+13)+"px";
      tip.style.top=(event.clientY+13)+"px";
      tip.innerHTML=currentMode==="town" ? `${esc(d.id.county)} ${esc(d.id.town||"")}<br><b>${val} 人附議</b>` : `${esc(d.id.county)}<br><b>${val} 人附議</b>`;
   })
   .on("mouseleave",()=>tip.style.opacity=0)
   .on("click",(event,d)=>{
      if(currentMode==="town" && d.id.town) showTownPanel(d.id);
      if(currentMode==="county" && d.id.county) showCountyPanel(d.id.county);
   });
 const countiesLoaded=new Set(rows.map(d=>d.id.county).filter(Boolean));
 const dataMatched=new Set(rows.filter(d=>DATA.towns[d.id.key]).map(d=>d.id.key));
 document.querySelector("#status").textContent=`已載入 ${countiesLoaded.size} 縣市、${rows.length} 個行政區；資料對應 ${dataMatched.size}/${Object.keys(DATA.towns).length} 個有附議鄉鎮`;
}).catch(err=>{
 document.querySelector("#status").textContent="地圖載入失敗";
 document.querySelector(".map-card").insertAdjacentHTML("beforeend",
 `<div class="error">完整行政區圖資無法載入。請確認網路連線後重新整理。<br>${esc(err.message)}</div>`);
});
</script>
</body>
</html>
